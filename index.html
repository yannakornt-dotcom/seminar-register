<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนร่วมงานสัมมนา - กรมทรัพยากรน้ำ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
            min-height: 100vh;
        }
        .container-box {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 119, 182, 0.1);
            padding: 30px;
            margin-top: 20px;
            margin-bottom: 30px;
        }
        .logo-img {
            max-width: 120px;
            display: block;
            margin: 0 auto;
        }
        .title-text {
            color: #0077b6;
            text-align: center;
            font-weight: 600;
            margin-top: 15px;
            margin-bottom: 25px;
        }
        .btn-water {
            background-color: #00b4d8;
            color: white;
            border-radius: 25px;
            font-weight: 600;
        }
        .btn-water:hover {
            background-color: #0096c7;
            color: white;
        }
        .form-label {
            font-weight: 600;
            color: #023e8a;
        }
        /* รูปแบบกล่อง input */
        .form-control, .form-select {
            border-radius: 10px;
            border: 1px solid #90e0ef;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="col-12 col-md-8 col-lg-6 container-box" id="app">
        <img src="https://dwr.go.th/uploads/userfiles/images/Logodwr.png" alt="Logo" class="logo-img">
        <h3 class="title-text">ระบบลงทะเบียนเข้าร่วมสัมมนา<br><small class="text-muted" style="font-size: 16px;">กรมทรัพยากรน้ำ</small></h3>
        
        <div id="loadingSec" class="text-center py-5">
            <div class="spinner-border text-info" role="status"></div>
            <p class="mt-2 text-info">กำลังตรวจสอบข้อมูล...</p>
        </div>

        <div id="searchSec" style="display: none;">
            <p class="text-center text-danger">ยังไม่พบประวัติการลงทะเบียนของท่าน</p>
            <div class="mb-3">
                <label class="form-label">กรุณากรอกหมายเลขบัตรประชาชน</label>
                <input type="text" class="form-control text-center" id="idCardInput" placeholder="0-0000-00000-00-0" oninput="formatIdCard(this)" maxlength="17">
            </div>
            <button class="btn btn-water w-100" onclick="verifyIdCard()">ค้นหาข้อมูล</button>
        </div>

        <div id="step1Sec" style="display: none;">
            <div class="alert alert-info" id="userInfoDisplay"></div>
            <hr>
            <h5 class="text-primary fw-bold">Step 1: ข้อมูลการเข้าร่วม</h5>
            <form id="regForm">
                <div class="mb-3">
                    <label class="form-label">ความประสงค์เข้าร่วมกิจกรรม <span class="text-danger">*</span></label>
                    <select class="form-select" id="joinIntention" required>
                        <option value="">-- กรุณาเลือก --</option>
                        <option value="Y">เข้าร่วม</option>
                        <option value="N">ไม่เข้าร่วม</option>
                    </select>
                </div>
                
                <div id="joinDetails" style="display: none;">
                    <div class="mb-3">
                        <label class="form-label">การเดินทาง (ขาไป) <span class="text-danger">*</span></label>
                        <select class="form-select" id="travelGo">
                            <option value="">-- กรุณาเลือก --</option>
                            <option value="รถยนต์ส่วนบุคคล">รถยนต์ส่วนบุคคล</option>
                            <option value="รถที่กรมจัดหาให้">รถที่กรมจัดหาให้</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">การเดินทาง (ขากลับ) <span class="text-danger">*</span></label>
                        <select class="form-select" id="travelReturn">
                            <option value="">-- กรุณาเลือก --</option>
                            <option value="รถยนต์ส่วนบุคคล">รถยนต์ส่วนบุคคล</option>
                            <option value="รถที่กรมจัดหาให้">รถที่กรมจัดหาให้</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">การแพ้อาหาร <span class="text-danger">*</span></label>
                        <select class="form-select" id="allergyChoice" onchange="toggleAllergyDetail()">
                            <option value="ไม่แพ้">ไม่แพ้</option>
                            <option value="แพ้">แพ้ (โปรดระบุ)</option>
                        </select>
                        <input type="text" class="form-control mt-2" id="allergyDetail" placeholder="ระบุสิ่งที่แพ้" style="display: none;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ประเภทอาหาร <span class="text-danger">*</span></label>
                        <select class="form-select" id="foodType" onchange="toggleFoodDetail()">
                            <option value="">-- กรุณาเลือก --</option>
                            <option value="ทานได้ทุกอย่าง">ทานได้ทุกอย่าง</option>
                            <option value="อิสลาม">อิสลาม</option>
                            <option value="มังสวิรัติ">มังสวิรัติ</option>
                            <option value="อื่นๆ">อื่น ๆ (โปรดระบุ)</option>
                        </select>
                        <input type="text" class="form-control mt-2" id="foodOther" placeholder="ระบุประเภทอาหาร" style="display: none;">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">หมายเลขโทรศัพท์มือถือ <span class="text-danger">*</span></label>
                    <input type="tel" class="form-control" id="phone" required maxlength="10">
                </div>
                <div class="mb-3">
                    <label class="form-label">ข้อมูลเพิ่มเติม (ถ้ามี)</label>
                    <textarea class="form-control" id="additionalInfo" rows="2"></textarea>
                </div>
                
                <button type="button" class="btn btn-water w-100" onclick="submitStep1()">บันทึกข้อมูล Step 1</button>
            </form>
        </div>

        <div id="step2Sec" style="display: none;">
            <h5 class="text-primary fw-bold">Step 2: การจัดการห้องพัก</h5>
            <div id="roomManagementContent">
                </div>
        </div>

    </div>
</div>

<script>
    // ตั้งค่า URL ของ GAS (แก้ URL ให้ตรงกับที่ Deploy)
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz4SW3PjipqUdAMCj-IbqJhxTzUPyKq-Qa_5dkserHvu28bIFdFmHmeD5ReDtkjDaqc/exec";
    let userProfile = {};
    let dbInfo = {};

    // เริ่มทำงาน LIFF
    async function initLiff() {
        try {
            await liff.init({ liffId: "2010492833-vdob7H57" });
            if (liff.isLoggedIn()) {
                userProfile = await liff.getProfile();
                checkUserStatus();
            } else {
                liff.login();
            }
        } catch (err) {
            Swal.fire('Error', 'ไม่สามารถเชื่อมต่อ LINE ได้', 'error');
        }
    }

    // ฟังก์ชันจัดฟอร์แมตบัตรประชาชน
    function formatIdCard(input) {
        let val = input.value.replace(/\D/g, '');
        let formatted = '';
        if(val.length > 0) formatted += val.substring(0,1);
        if(val.length > 1) formatted += '-' + val.substring(1,5);
        if(val.length > 5) formatted += '-' + val.substring(5,10);
        if(val.length > 10) formatted += '-' + val.substring(10,12);
        if(val.length > 12) formatted += '-' + val.substring(12,13);
        input.value = formatted;
    }

    // ติดต่อ Server ผ่าน Fetch API
    async function callGasAPI(action, payload) {
        const bodyData = { action: action, ...payload };
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(bodyData),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' } // หลีกเลี่ยง Preflight CORS errors บน GAS
        });
        return await response.json();
    }

    async function checkUserStatus() {
        document.getElementById('loadingSec').style.display = 'block';
        document.getElementById('searchSec').style.display = 'none';
        
        const res = await callGasAPI('checkUser', { lineUid: userProfile.userId });
        document.getElementById('loadingSec').style.display = 'none';

        if (res.data.isRegistered) {
            // แสดงหน้าแก้ไข/สรุปข้อมูล
            Swal.fire('ยินดีต้อนรับ', 'ท่านได้ลงทะเบียนไว้แล้ว', 'success');
            // TODO: เขียน logic ดึงข้อมูลเดิมมาเติมลง Form และแสดง Step 2
        } else {
            // แสดงหน้าค้นหาบัตร ปชช
            document.getElementById('searchSec').style.display = 'block';
        }
    }

    async function verifyIdCard() {
        const idInput = document.getElementById('idCardInput').value;
        if(idInput.length < 17) {
            Swal.fire('แจ้งเตือน', 'กรุณากรอกเลขบัตร 13 หลักให้ครบถ้วน', 'warning');
            return;
        }

        Swal.fire({ title: 'กำลังค้นหา...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
        
        const res = await callGasAPI('verifyIdCard', { idCard: idInput, lineUid: userProfile.userId });
        
        if (res.data.found) {
            Swal.close();
            dbInfo = res.data;
            dbInfo.idCard = idInput;
            
            document.getElementById('searchSec').style.display = 'none';
            document.getElementById('step1Sec').style.display = 'block';
            
            document.getElementById('userInfoDisplay').innerHTML = `
                <strong>ชื่อ-สกุล:</strong> ${dbInfo.fullName}<br>
                <strong>ตำแหน่ง:</strong> ${dbInfo.position} (${dbInfo.department})
            `;
        } else {
            Swal.fire('ไม่พบข้อมูล', 'ไม่พบหมายเลขบัตรประชาชนของท่านในฐานข้อมูล', 'error');
        }
    }

    // ซ่อนแสดง UI
    document.getElementById('joinIntention').addEventListener('change', function() {
        document.getElementById('joinDetails').style.display = (this.value === 'Y') ? 'block' : 'none';
    });

    function toggleAllergyDetail() {
        const choice = document.getElementById('allergyChoice').value;
        document.getElementById('allergyDetail').style.display = (choice === 'แพ้') ? 'block' : 'none';
    }

    function toggleFoodDetail() {
        const choice = document.getElementById('foodType').value;
        document.getElementById('foodOther').style.display = (choice === 'อื่นๆ') ? 'block' : 'none';
    }

    async function submitStep1() {
        // Validate inputs
        const join = document.getElementById('joinIntention').value;
        const phone = document.getElementById('phone').value;
        if(!join || !phone) {
            Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลที่มีเครื่องหมาย * ให้ครบถ้วน', 'warning');
            return;
        }

        const regData = {
            lineUid: userProfile.userId,
            idCard: dbInfo.idCard,
            fullName: dbInfo.fullName,
            join: join,
            travelGo: document.getElementById('travelGo').value,
            travelReturn: document.getElementById('travelReturn').value,
            allergyDetails: document.getElementById('allergyChoice').value === 'แพ้' ? document.getElementById('allergyDetail').value : '',
            foodType: document.getElementById('foodType').value === 'อื่นๆ' ? document.getElementById('foodOther').value : document.getElementById('foodType').value,
            phone: phone,
            additional: document.getElementById('additionalInfo').value
        };

        Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => { Swal.showLoading() } });

        const res = await callGasAPI('saveRegistration', { regData: regData });
        if(res.status === 'success') {
            Swal.fire('สำเร็จ', 'บันทึกข้อมูล Step 1 เรียบร้อย', 'success');
            document.getElementById('step1Sec').style.display = 'none';
            if(join === 'Y' && dbInfo.singleRoom !== 'Y') {
                document.getElementById('step2Sec').style.display = 'block';
                // TODO: Load Step 2 logic
            }
        } else {
            Swal.fire('ข้อผิดพลาด', res.message, 'error');
        }
    }

    // เริ่มต้นระบบ
    initLiff();
</script>
</body>
</html>
