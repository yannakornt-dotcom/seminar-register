<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนสัมมนา - กรมทรัพยากรน้ำ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(180deg, #e0f2fe 0%, #bae6fd 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .water-btn {
            background: linear-gradient(90deg, #0284c7 0%, #0ea5e9 100%);
            color: white;
            transition: all 0.3s;
        }
        .water-btn:hover {
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.5);
            transform: translateY(-2px);
        }
        /* Wave Animation Bottom */
        .wave-container { position: fixed; bottom: 0; width: 100%; height: 100px; z-index: -1; }
        .wave { background: url('https://dwr.go.th/uploads/userfiles/images/Logodwr.png') no-repeat; opacity: 0.1; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="w-full max-w-md glass-card p-6 mt-4">
        <div class="text-center mb-6">
            <img src="https://dwr.go.th/uploads/userfiles/images/Logodwr.png" alt="DWR Logo" class="w-24 mx-auto mb-2">
            <h1 class="text-xl font-bold text-sky-800">ลงทะเบียนร่วมงานสัมมนา</h1>
            <p class="text-sm text-sky-600">กรมทรัพยากรน้ำ</p>
        </div>

        <div id="section-login">
            <p id="loading-text" class="text-center text-gray-500 animate-pulse">กำลังตรวจสอบข้อมูล LINE...</p>
            
            <div id="idcard-form" class="hidden mt-4">
                <label class="block text-sm font-semibold text-gray-700">ระบุเลขประจำตัวประชาชน 13 หลัก</label>
                <input type="text" id="idcard" maxlength="17" placeholder="X-XXXX-XXXXX-XX-X" 
                       class="mt-1 w-full p-3 border border-sky-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-500 text-center text-lg">
                <button onclick="verifyID()" class="mt-4 w-full water-btn font-bold py-3 px-4 rounded-xl">ตรวจสอบข้อมูล</button>
            </div>
        </div>

        <div id="section-form" class="hidden space-y-4">
            <div class="bg-sky-50 p-4 rounded-xl text-sm text-sky-900 shadow-inner">
                <p><strong>ชื่อ-สกุล:</strong> <span id="info-name"></span></p>
                <p><strong>ตำแหน่ง:</strong> <span id="info-pos"></span></p>
                <p><strong>สังกัด:</strong> <span id="info-dept"></span></p>
            </div>

            <form id="regForm" class="space-y-4 text-sm">
                <div>
                    <label class="font-semibold text-gray-700">1. ความประสงค์เข้าร่วมกิจกรรม <span class="text-red-500">*</span></label>
                    <select id="f_attend" class="w-full p-2 border rounded-lg" required onchange="toggleForm()">
                        <option value="">-- กรุณาเลือก --</option>
                        <option value="Y">เข้าร่วม</option>
                        <option value="N">ไม่เข้าร่วม</option>
                    </select>
                </div>

                <div id="attend-fields" class="hidden space-y-4">
                    <div>
                        <label class="font-semibold text-gray-700">2. การเดินทาง (ขาไป) <span class="text-red-500">*</span></label>
                        <select id="f_go" class="w-full p-2 border rounded-lg">
                            <option value="">-- กรุณาเลือก --</option>
                            <option value="Car">รถยนต์ส่วนบุคคล</option>
                            <option value="Van">รถที่กรมจัดหาให้</option>
                        </select>
                        <label class="font-semibold text-gray-700 mt-2 block">การเดินทาง (ขากลับ) <span class="text-red-500">*</span></label>
                        <select id="f_return" class="w-full p-2 border rounded-lg">
                            <option value="">-- กรุณาเลือก --</option>
                            <option value="Car">รถยนต์ส่วนบุคคล</option>
                            <option value="Van">รถที่กรมจัดหาให้</option>
                        </select>
                    </div>

                    <div>
                        <label class="font-semibold text-gray-700">3. การแพ้อาหาร <span class="text-red-500">*</span></label>
                        <select id="f_allergy" class="w-full p-2 border rounded-lg" onchange="checkAllergy()">
                            <option value="">-- กรุณาเลือก --</option>
                            <option value="No">ไม่แพ้</option>
                            <option value="Yes">แพ้ (โปรดระบุ)</option>
                        </select>
                        <input type="text" id="f_allergy_detail" class="hidden mt-2 w-full p-2 border rounded-lg" placeholder="ระบุอาหารที่แพ้">
                    </div>

                    <div>
                        <label class="font-semibold text-gray-700">4. ประเภทอาหาร <span class="text-red-500">*</span></label>
                        <select id="f_food" class="w-full p-2 border rounded-lg" onchange="checkFood()">
                            <option value="">-- กรุณาเลือก --</option>
                            <option value="Normal">ทานได้ทุกอย่าง</option>
                            <option value="Halal">อิสลาม</option>
                            <option value="Veg">มังสวิรัติ</option>
                            <option value="Other">อื่นๆ (โปรดระบุ)</option>
                        </select>
                        <input type="text" id="f_food_detail" class="hidden mt-2 w-full p-2 border rounded-lg" placeholder="ระบุประเภทอาหาร">
                    </div>

                    <div>
                        <label class="font-semibold text-gray-700">5. เบอร์โทรศัพท์มือถือ <span class="text-red-500">*</span></label>
                        <input type="tel" id="f_phone" class="w-full p-2 border rounded-lg" maxlength="10">
                    </div>
                </div>

                <div>
                    <label class="font-semibold text-gray-700">6. ข้อมูลเพิ่มเติม (ไม่บังคับ)</label>
                    <textarea id="f_note" class="w-full p-2 border rounded-lg" rows="2"></textarea>
                </div>

                <button type="button" onclick="submitRegistration()" class="w-full water-btn font-bold py-3 px-4 rounded-xl shadow-lg">บันทึกข้อมูล</button>
            </form>
        </div>

        <div id="section-match" class="hidden space-y-4">
            <h2 class="text-lg font-bold text-sky-800 border-b-2 border-sky-300 pb-2">ระบบจับคู่นอนพัก</h2>
            
            <div id="match-status-area" class="bg-white p-4 rounded-xl border border-sky-200">
                </div>

            <div id="search-roommate-area" class="mt-4">
                <label class="font-semibold text-gray-700 text-sm">ค้นหาชื่อ-สกุล ผู้เข้าร่วมเพื่อจับคู่</label>
                <div class="flex gap-2 mt-1">
                    <input type="text" id="search-name" class="flex-1 p-2 border rounded-lg text-sm" placeholder="พิมพ์ชื่อ-สกุล">
                    <button onclick="searchRoommate()" class="bg-sky-600 text-white px-4 rounded-lg">ค้นหา</button>
                </div>
                <div id="search-results" class="mt-2 text-sm text-gray-600"></div>
            </div>
            
            <button onclick="loadRoommateStatus()" class="w-full mt-4 bg-gray-100 text-gray-700 py-2 rounded-lg text-sm border border-gray-300">
                🔄 รีเฟรชสถานะ
            </button>
        </div>

    </div>

    <script>
        const LIFF_ID = "2010492833-vdob7H57";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz4SW3PjipqUdAMCj-IbqJhxTzUPyKq-Qa_5dkserHvu28bIFdFmHmeD5ReDtkjDaqc/exec";
        
        let userUid = "";
        let idCardGlobal = "";
        let singleRoomFlag = "N";

        // --- Init Line LIFF ---
        async function main() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }
            const profile = await liff.getProfile();
            userUid = profile.userId;
            checkRegistration();
        }
        main();

        // --- ID Card Auto Format ---
        document.getElementById('idcard').addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,1})(\d{0,4})(\d{0,5})(\d{0,2})(\d{0,1})/);
            e.target.value = !x[2] ? x[1] : x[1] + '-' + x[2] + (x[3] ? '-' + x[3] : '') + (x[4] ? '-' + x[4] : '') + (x[5] ? '-' + x[5] : '');
        });

        // --- API Call Helper ---
        async function callGAS(payload) {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' }, // Avoid CORS Preflight
                body: JSON.stringify(payload)
            });
            return await response.json();
        }

        // --- Check User ---
        async function checkRegistration() {
            const res = await callGAS({ action: 'checkUser', uid: userUid });
            document.getElementById('loading-text').classList.add('hidden');
            
            if (res.registered) {
                // Populate data & go to Step 2
                Swal.fire({ icon: 'info', title: 'พบข้อมูลการลงทะเบียน', text: 'เข้าสู่หน้าจัดการข้อมูล', timer: 1500, showConfirmButton: false });
                idCardGlobal = res.data[2];
                // ดึงข้อมูล Info มาโชว์
                await verifyID(idCardGlobal, true); // Silent verify to get Name/Dept
                showSection('section-match');
                loadRoommateStatus();
            } else {
                document.getElementById('idcard-form').classList.remove('hidden');
            }
        }

        // --- Verify ID Card ---
        async function verifyID(overrideId = null, silent = false) {
            let id = overrideId || document.getElementById('idcard').value;
            if (id.length !== 17 && !silent) {
                Swal.fire('แจ้งเตือน', 'กรุณากรอกเลขบัตร 13 หลักให้ครบถ้วน', 'warning');
                return;
            }

            if (!silent) Swal.showLoading();
            const res = await callGAS({ action: 'verifyID', idCard: id, uid: userUid });
            if (!silent) Swal.close();

            if (res.found) {
                idCardGlobal = id;
                singleRoomFlag = res.info.singleRoom;
                document.getElementById('info-name').innerText = res.info.fullname;
                document.getElementById('info-pos').innerText = res.info.position;
                document.getElementById('info-dept').innerText = res.info.department;
                showSection('section-form');
            } else {
                if(!silent) Swal.fire('ไม่พบข้อมูล', 'ไม่พบเลขบัตรประชาชนนี้ในฐานข้อมูล', 'error');
            }
        }

        // --- UI Toggles ---
        function toggleForm() {
            let attend = document.getElementById('f_attend').value;
            let fields = document.getElementById('attend-fields');
            if (attend === 'Y') {
                fields.classList.remove('hidden');
                document.getElementById('f_go').required = true;
            } else {
                fields.classList.add('hidden');
                document.getElementById('f_go').required = false;
            }
        }
        function checkAllergy() {
            let val = document.getElementById('f_allergy').value;
            let d = document.getElementById('f_allergy_detail');
            val === 'Yes' ? d.classList.remove('hidden') : d.classList.add('hidden');
        }
        function checkFood() {
            let val = document.getElementById('f_food').value;
            let d = document.getElementById('f_food_detail');
            val === 'Other' ? d.classList.remove('hidden') : d.classList.add('hidden');
        }
        function showSection(id) {
            ['section-login', 'section-form', 'section-match'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // --- Submit ---
        async function submitRegistration() {
            let attend = document.getElementById('f_attend').value;
            if (!attend) return Swal.fire('ผิดพลาด', 'กรุณาระบุความประสงค์', 'warning');
            
            if (attend === 'N') {
                let conf = await Swal.fire({ title: 'ยืนยัน?', text: 'หากท่านยืนยันว่า "ไม่เข้าร่วม" สิทธิ์การจับคู่นอนที่ทำไว้จะถูกยกเลิกทั้งหมด', icon: 'warning', showCancelButton: true });
                if(!conf.isConfirmed) return;
            }

            Swal.fire({title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false});
            Swal.showLoading();

            let allergyDetail = document.getElementById('f_allergy').value === 'Yes' ? document.getElementById('f_allergy_detail').value : '';
            let foodDetail = document.getElementById('f_food').value === 'Other' ? document.getElementById('f_food_detail').value : document.getElementById('f_food').value;

            let data = {
                uid: userUid, idCard: idCardGlobal, attend: attend,
                goBy: document.getElementById('f_go').value, returnBy: document.getElementById('f_return').value,
                allergy: document.getElementById('f_allergy').value + " " + allergyDetail,
                foodType: foodDetail, phone: document.getElementById('f_phone').value,
                note: document.getElementById('f_note').value
            };

            const res = await callGAS({ action: 'saveRegister', data: data });
            if (res.status === 'success') {
                Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อย', 'success');
                if(attend === 'Y') {
                    showSection('section-match');
                    loadRoommateStatus();
                } else {
                    liff.closeWindow();
                }
            } else {
                Swal.fire('ข้อผิดพลาด', res.message, 'error');
            }
        }

        // --- Roommate Logic ---
        async function loadRoommateStatus() {
            if(singleRoomFlag === 'Y') {
                document.getElementById('section-match').innerHTML = `<h2 class="text-center text-lg text-sky-700 font-bold mt-10">ท่านได้รับสิทธิ์นอนเดี่ยว<br>ไม่ต้องทำการจับคู่</h2>`;
                return;
            }

            const res = await callGAS({ action: 'getRoommateStatus', uid: userUid });
            let html = '';
            
            if(res.matched) {
                html = `<div class="bg-green-100 p-3 rounded-lg text-green-800 text-center font-bold">
                            🎉 ท่านจับคู่นอนเรียบร้อยแล้วกับ:<br><span class="text-xl">${res.matched}</span>
                        </div>`;
                document.getElementById('search-roommate-area').classList.add('hidden');
            } else {
                if(res.incoming.length > 0) {
                    html += `<p class="font-bold text-sky-700 mt-2">คำขอจับคู่ถึงคุณ:</p>`;
                    res.incoming.forEach(req => {
                        html += `<div class="flex justify-between items-center bg-orange-50 p-2 rounded-lg mt-1 text-sm border border-orange-200">
                                    <span>${req.name}</span>
                                    <div>
                                        <button onclick="respondReq('${req.uid}', 'Accept')" class="bg-green-500 text-white px-2 py-1 rounded">ยอมรับ</button>
                                        <button onclick="respondReq('${req.uid}', 'Reject')" class="bg-red-500 text-white px-2 py-1 rounded">ปฏิเสธ</button>
                                    </div>
                                 </div>`;
                    });
                }
                if(res.outgoing.length > 0) {
                    html += `<p class="font-bold text-gray-600 mt-4 text-xs">คุณได้ส่งคำขอไปหา:</p>`;
                    res.outgoing.forEach(req => {
                        html += `<div class="bg-gray-100 p-2 rounded-lg mt-1 text-xs text-gray-500">รอการตอบรับจาก: ${req.name}</div>`;
                    });
                }
                if(res.incoming.length === 0 && res.outgoing.length === 0) {
                    html += `<p class="text-gray-500 text-sm text-center">ยังไม่มีการจับคู่</p>`;
                }
                document.getElementById('search-roommate-area').classList.remove('hidden');
            }
            document.getElementById('match-status-area').innerHTML = html;
        }

        async function searchRoommate() {
            let kw = document.getElementById('search-name').value;
            if(kw.length < 2) return Swal.fire('แจ้งเตือน','กรุณาพิมพ์ชื่ออย่างน้อย 2 ตัวอักษร','warning');
            
            document.getElementById('search-results').innerHTML = 'กำลังค้นหา...';
            const res = await callGAS({ action: 'searchRoommate', keyword: kw, uid: userUid });
            
            if(res.data.length === 0) {
                document.getElementById('search-results').innerHTML = `<p class="text-red-500">บุคคลที่ท่านกำลังค้นหาอาจยังไม่ลงทะเบียน ไม่เข้าร่วมกิจกรรมนี้ หรือจับคู่นอนไปเรียบร้อยแล้ว</p>`;
                return;
            }

            let html = '';
            res.data.forEach(user => {
                html += `<div class="flex justify-between items-center bg-white p-2 border rounded-lg mt-2">
                            <div><p class="font-bold text-sky-800">${user.name}</p><p class="text-xs text-gray-500">${user.dept}</p></div>
                            <button onclick="sendReq('${user.uid}')" class="bg-sky-500 text-white px-3 py-1 rounded-lg text-xs">ส่งคำขอ</button>
                         </div>`;
            });
            document.getElementById('search-results').innerHTML = html;
        }

        async function sendReq(targetUid) {
            Swal.showLoading();
            await callGAS({ action: 'sendRequest', reqUid: userUid, targetUid: targetUid });
            Swal.fire('สำเร็จ', 'ส่งคำขอจับคู่เรียบร้อย รอกการตอบรับ', 'success');
            loadRoommateStatus();
            document.getElementById('search-results').innerHTML = '';
        }

        async function respondReq(reqUid, action) {
            Swal.showLoading();
            await callGAS({ action: 'respondRequest', reqUid: reqUid, targetUid: userUid, response: action });
            Swal.fire('สำเร็จ', 'บันทึกการทำรายการเรียบร้อย', 'success');
            loadRoommateStatus();
        }
    </script>
</body>
</html>
