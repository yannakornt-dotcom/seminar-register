<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนเข้าร่วมสัมมนา</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f0fdf4; /* โทนสีเขียวพาสเทลน่ารัก */
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }
        .logo-container img {
            width: 120px;
            max-width: 100%;
            height: auto;
            /* ควบคุมไม่ให้โลโก้โดนตัดทอน (Crop) ตามสัดส่วนเดิมเป๊ะๆ */
            object-fit: contain; 
            display: block;
        }
        .input-cute {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .input-cute:focus {
            border-color: #4ade80;
            box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.2);
            outline: none;
        }
    </style>
</head>
<body class="p-4 flex justify-center items-center min-h-screen">

    <div class="glass-card w-full max-w-md p-6">
        <div class="logo-container">
            <img src="https://dwr.go.th/uploads/userfiles/images/Logodwr.png" alt="DWR Logo">
        </div>
        <h2 class="text-xl font-semibold text-center text-gray-800 mb-6">ระบบลงทะเบียนสัมมนา<br><span class="text-sm font-normal text-gray-500">และการจัดการห้องพัก</span></h2>

        <div id="loading" class="text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-500 mx-auto"></div>
            <p class="mt-4 text-gray-600">กำลังตรวจสอบข้อมูลบัญชีของท่าน...</p>
        </div>

        <div id="idCheckSection" class="hidden">
            <p class="text-sm text-red-500 text-center mb-4">ไม่พบประวัติการลงทะเบียน กรุณายืนยันตัวตน</p>
            <label class="block text-sm font-medium text-gray-700 mb-1">หมายเลขบัตรประชาชน (13 หลัก)</label>
            <input type="text" id="nationalIdInput" placeholder="0-0000-00000-00-0" class="input-cute w-full p-3 mb-4" oninput="formatID(this)">
            <button onclick="searchID()" class="w-full bg-green-500 text-white font-semibold p-3 rounded-xl shadow-lg shadow-green-200 active:scale-95 transition-transform">
                ค้นหาข้อมูล
            </button>
        </div>

        <div id="registrationForm" class="hidden">
            </div>

    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz4SW3PjipqUdAMCj-IbqJhxTzUPyKq-Qa_5dkserHvu28bIFdFmHmeD5ReDtkjDaqc/exec"; // ใส่ URL ที่ได้จาก GAS ทีนี่
        let userLineUID = "";

        async function initLIFF() {
            try {
                // รอใส่ LIFF ID ของคุณ
                // await liff.init({ liffId: "2010492833-vdob7H57" }); 
                // if (!liff.isLoggedIn()) liff.login();
                // const profile = await liff.getProfile();
                // userLineUID = profile.userId;
                
                userLineUID = "MOCK_LINE_UID_12345"; // Mock สำหรับทดสอบ
                checkRegistration();
            } catch (err) {
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อ LINE ได้', 'error');
            }
        }

        async function checkRegistration() {
            // จำลองการ Fetch ไปยัง GAS
            // const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'checkUser', lineUid: userLineUID }) });
            // const data = await res.json();
            
            // Mock Response
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
                // สมมติว่ายังไม่เคยลงทะเบียน
                document.getElementById('idCheckSection').classList.remove('hidden');
            }, 1500);
        }

        function formatID(input) {
            let val = input.value.replace(/\D/g, '');
            if(val.length > 13) val = val.substring(0,13);
            let formatted = '';
            for(let i=0; i<val.length; i++) {
                if(i===1 || i===5 || i===10 || i===12) formatted += '-';
                formatted += val[i];
            }
            input.value = formatted;
        }

        function searchID() {
            const id = document.getElementById('nationalIdInput').value;
            if(id.length !== 17) {
                Swal.fire('แจ้งเตือน', 'กรุณากรอกเลขบัตร 13 หลักให้ครบถ้วน', 'warning');
                return;
            }
            
            Swal.fire({
                title: 'กำลังค้นหา',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            // Call API ค้นหาข้อมูลจาก Sheet 'database'
            // หากพบ ขึ้น Popup ยืนยัน ชื่อ-สกุล ตำแหน่ง สังกัด
            setTimeout(() => {
                Swal.fire({
                    title: 'พบข้อมูล',
                    html: `<div class="text-left"><p><b>ชื่อ-สกุล:</b> นาย ทดสอบ ระบบ</p><p><b>ตำแหน่ง:</b> นักวิชาการ</p><p><b>สังกัด:</b> ศูนย์เทคโนโลยี</p></div>`,
                    icon: 'success',
                    confirmButtonText: 'ยืนยันและดำเนินการต่อ',
                    confirmButtonColor: '#4ade80'
                }).then((result) => {
                    if(result.isConfirmed) {
                        document.getElementById('idCheckSection').classList.add('hidden');
                        // เปิดหน้าฟอร์มกรอกข้อมูลเพิ่ม (อาหาร, การเดินทาง)
                    }
                });
            }, 1000);
        }

        // เริ่มการทำงาน
        initLIFF();
    </script>
</body>
</html>
