<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนงานสัมมนา DWR</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f8ff; }
        
        /* Water Drop Loading Animation */
        .water-loader {
            width: 50px;
            height: 50px;
            background-color: #3b82f6;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            animation: bounce 1s infinite alternate cubic-bezier(0.5, 0.05, 1, 0.5);
            margin: 0 auto;
        }
        @keyframes bounce {
            0% { transform: rotate(-45deg) translate(0, 0); }
            100% { transform: rotate(-45deg) translate(30px, 30px); border-radius: 50% 50% 50% 10%; }
        }
        .loading-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9); display: flex;
            flex-direction: column; justify-content: center; align-items: center; z-index: 50;
        }
        
        /* Input formatting */
        .input-dwr {
            width: 100%; padding: 0.75rem; border: 1px solid #93c5fd; border-radius: 0.5rem;
            margin-top: 0.5rem; outline: none; transition: border-color 0.3s;
        }
        .input-dwr:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="text-gray-700">

    <div id="loading" class="loading-screen">
        <div class="water-loader"></div>
        <p class="mt-8 text-blue-600 font-bold text-lg">กำลังประมวลผลสายน้ำ...</p>
    </div>

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg p-6 hidden" id="app">
        <div class="text-center mb-6">
            <img src="https://dwr.go.th/uploads/userfiles/images/Logodwr.png" alt="Logo" class="h-24 mx-auto mb-2 drop-shadow-md">
            <h1 class="text-2xl font-bold text-blue-800">ระบบลงทะเบียนสัมมนา</h1>
            <p class="text-sm text-blue-500">กรมทรัพยากรน้ำ</p>
        </div>

        <div id="section-check-id" class="hidden animate-fade-in">
            <p class="text-center text-red-500 mb-4 font-semibold">ยังไม่พบประวัติการลงทะเบียนของคุณ</p>
            <label class="block font-medium">โปรดกรอกเลขประจำตัวประชาชน (13 หลัก)</label>
            <input type="text" id="natID" class="input-dwr text-center text-lg tracking-widest" placeholder="X-XXXX-XXXXX-XX-X" maxlength="17" oninput="formatNatID(this)">
            <button onclick="verifyNatID()" class="w-full mt-4 bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow-md">ตรวจสอบข้อมูล</button>
        </div>

        <div id="section-register" class="hidden">
            <div class="bg-blue-50 p-4 rounded-lg mb-4 border border-blue-200">
                <p id="dispName" class="font-bold text-blue-800"></p>
                <p id="dispPos" class="text-sm text-gray-600"></p>
                <p id="dispDept" class="text-sm text-gray-600"></p>
            </div>

            <form id="regForm" onsubmit="submitForm(event)">
                <div class="mb-4">
                    <label class="block font-medium">ความประสงค์เข้าร่วมกิจกรรม</label>
                    <select id="f_attend" class="input-dwr" onchange="toggleForm(this.value)">
                        <option value="">-- กรุณาเลือก --</option>
                        <option value="Y">เข้าร่วม</option>
                        <option value="N">ไม่เข้าร่วม</option>
                    </select>
                </div>
                
                <div id="attendDetails" class="hidden">
                    <div class="mb-4">
                        <label class="block font-medium">การเดินทาง (ขาไป)</label>
                        <select id="f_travelGo" class="input-dwr">
                            <option value="">-- เลือก --</option>
                            <option value="Car">รถยนต์ส่วนบุคคล</option>
                            <option value="Bus">รถที่กรมจัดหาให้</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block font-medium">การเดินทาง (ขากลับ)</label>
                        <select id="f_travelBack" class="input-dwr">
                            <option value="">-- เลือก --</option>
                            <option value="Car">รถยนต์ส่วนบุคคล</option>
                            <option value="Bus">รถที่กรมจัดหาให้</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block font-medium">การแพ้อาหาร</label>
                        <select id="f_allergy" class="input-dwr" onchange="toggleInput('f_allergy', 'f_allergy_detail', 'แพ้')">
                            <option value="">-- เลือก --</option>
                            <option value="ไม่แพ้">ไม่แพ้</option>
                            <option value="แพ้">แพ้ (ระบุ)</option>
                        </select>
                        <input type="text" id="f_allergy_detail" class="input-dwr hidden mt-2" placeholder="ระบุอาหารที่แพ้">
                    </div>
                    <div class="mb-4">
                        <label class="block font-medium">ประเภทอาหาร</label>
                        <select id="f_food" class="input-dwr" onchange="toggleInput('f_food', 'f_food_detail', 'อื่นๆ')">
                            <option value="">-- เลือก --</option>
                            <option value="ทั่วไป">ทานได้ทุกอย่าง</option>
                            <option value="อิสลาม">อิสลาม</option>
                            <option value="มังสวิรัติ">มังสวิรัติ</option>
                            <option value="อื่นๆ">อื่นๆ (ระบุ)</option>
                        </select>
                        <input type="text" id="f_food_detail" class="input-dwr hidden mt-2" placeholder="ระบุประเภทอาหาร">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block font-medium">หมายเลขโทรศัพท์มือถือ</label>
                    <input type="tel" id="f_phone" class="input-dwr" placeholder="08xxxxxxxx" maxlength="10">
                </div>
                <div class="mb-4">
                    <label class="block font-medium">ข้อเสนอแนะเพิ่มเติม (ไม่บังคับ)</label>
                    <textarea id="f_extra" class="input-dwr h-20"></textarea>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow-md">บันทึกข้อมูล</button>
            </form>
        </div>
    </div>

    <script>
        // !! เปลี่ยนเป็น Web App URL ของคุณที่ Deploy จาก GAS !!
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz4SW3PjipqUdAMCj-IbqJhxTzUPyKq-Qa_5dkserHvu28bIFdFmHmeD5ReDtkjDaqc/exec";
        const LIFF_ID = "2010492833-vdob7H57";
        let userLineUID = "";
        let unmaskedNatID = "";

        // เริ่มต้น LIFF
        async function initApp() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                const profile = await liff.getProfile();
                userLineUID = profile.userId;
                checkUser(userLineUID);
            } catch (err) {
                Swal.fire('Error', 'ไม่สามารถเชื่อมต่อ LINE ได้', 'error');
            }
        }

        // เชื่อมต่อ GAS API
        async function callGAS(payload) {
            showLoading(true);
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // ใช้ text/plain เลี่ยง preflight ใน GAS
                    body: JSON.stringify(payload)
                });
                const res = await response.json();
                showLoading(false);
                return res.data;
            } catch (err) {
                showLoading(false);
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
                console.error(err);
            }
        }

        async function checkUser(uid) {
            const data = await callGAS({ action: 'checkUser', uid: uid });
            document.getElementById('app').classList.remove('hidden');
            
            if (data.isRegistered) {
                // กรณีพบข้อมูล - ตรวจสอบว่าแก้ไขได้ไหม หรือไปยังหน้าจับคู่
                Swal.fire('พบข้อมูล', 'คุณลงทะเบียนเรียบร้อยแล้ว', 'success');
                // TODO: Load data to form and setup room match UI
            } else {
                if (data.canRegister) {
                    Swal.fire({ title: 'ยินดีต้อนรับ', text: 'ไม่พบข้อมูลในระบบ กรุณาลงทะเบียน', icon: 'info', confirmButtonText: 'ตกลง' });
                    document.getElementById('section-check-id').classList.remove('hidden');
                } else {
                    Swal.fire('ปิดระบบ', 'ไม่อยู่ในช่วงเวลาการลงทะเบียน', 'warning');
                }
            }
        }

        // จัดรูปแบบเลขบัตรประชาชน
        function formatNatID(input) {
            let val = input.value.replace(/\D/g, '');
            if (val.length > 13) val = val.substring(0, 13);
            unmaskedNatID = val;
            let formatted = val.replace(/(\d{1})(\d{4})(\d{5})(\d{2})(\d{1})/, "$1-$2-$3-$4-$5");
            input.value = formatted;
        }

        async function verifyNatID() {
            if (unmaskedNatID.length !== 13) return Swal.fire('ตรวจสอบ', 'กรุณากรอกเลขบัตร 13 หลักให้ครบถ้วน', 'warning');
            
            const data = await callGAS({ action: 'verifyNatID', natID: unmaskedNatID, uid: userLineUID });
            if (data.found) {
                document.getElementById('section-check-id').classList.add('hidden');
                document.getElementById('section-register').classList.remove('hidden');
                document.getElementById('dispName').innerText = data.name;
                document.getElementById('dispPos').innerText = `ตำแหน่ง: ${data.position}`;
                document.getElementById('dispDept').innerText = `สังกัด: ${data.department}`;
            } else {
                Swal.fire('ไม่พบข้อมูล', 'ไม่มีหมายเลขบัตรประชาชนนี้ในฐานข้อมูล', 'error');
            }
        }

        function toggleForm(val) {
            document.getElementById('attendDetails').style.display = val === 'Y' ? 'block' : 'none';
        }

        function toggleInput(selectId, inputId, triggerVal) {
            const val = document.getElementById(selectId).value;
            const input = document.getElementById(inputId);
            if (val === triggerVal) { input.classList.remove('hidden'); } 
            else { input.classList.add('hidden'); input.value = ''; }
        }

        async function submitForm(e) {
            e.preventDefault();
            const payload = {
                uid: userLineUID, natID: unmaskedNatID,
                attend: document.getElementById('f_attend').value,
                travelGo: document.getElementById('f_travelGo').value,
                travelBack: document.getElementById('f_travelBack').value,
                allergy: document.getElementById('f_allergy').value === 'แพ้' ? document.getElementById('f_allergy_detail').value : document.getElementById('f_allergy').value,
                foodType: document.getElementById('f_food').value === 'อื่นๆ' ? document.getElementById('f_food_detail').value : document.getElementById('f_food').value,
                phone: document.getElementById('f_phone').value,
                extra: document.getElementById('f_extra').value
            };
            
            if (!payload.phone || payload.phone.length < 9) return Swal.fire('เตือน', 'กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง', 'warning');

            const res = await callGAS({ action: 'saveRegister', payload: payload });
            if (res && res.success) {
                Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อยแล้ว', 'success').then(() => {
                    // หากเข้าร่วม โอนไปยังส่วนของการจับคู่นอน (Room Management Logic)
                    if(payload.attend === 'Y') {
                       // initRoomManagement();
                    } else {
                        liff.closeWindow();
                    }
                });
            }
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

        // ปิดเพื่อการพัฒนา ถ้ารันบน Browser ปกติ (ไม่ใช่ LINE) ข้าม init
        // document.addEventListener("DOMContentLoaded", initApp);
        document.addEventListener("DOMContentLoaded", () => {
            showLoading(false); document.getElementById('app').classList.remove('hidden');
            document.getElementById('section-check-id').classList.remove('hidden');
        }); 
    </script>
</body>
</html>
