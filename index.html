<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนสัมมนา - กรมทรัพยากรน้ำ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #0077b6; --secondary: #00b4d8; --light: #caf0f8; --white: #ffffff; }
        body { font-family: 'Sarabun', sans-serif; background: linear-gradient(135deg, var(--light) 0%, #e0fbfc 100%); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 500px; background: var(--white); border-radius: 20px; box-shadow: 0 10px 20px rgba(0, 119, 182, 0.1); padding: 30px 20px; margin: 20px 0; position: relative; }
        .container::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, var(--primary), var(--secondary)); }
        .header { text-align: center; margin-bottom: 20px; }
        .logo { width: 150px; height: auto; object-fit: contain; margin-bottom: 15px; }
        .title { color: var(--primary); font-weight: 600; font-size: 1.2rem; margin: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--primary); font-weight: 600; font-size: 0.95rem; }
        input[type="text"], input[type="tel"], select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-family: 'Sarabun', sans-serif; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-danger { background: #e63946; }
        .hidden { display: none; }
        .card { background: #f1f9f9; border-left: 4px solid var(--secondary); padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        .refresh-btn { float: right; font-size: 0.8rem; padding: 5px 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://dwr.go.th/uploads/userfiles/images/Logodwr.png" alt="DWR Logo" class="logo">
        <h1 class="title">ระบบลงทะเบียนและจัดการห้องพัก</h1>
    </div>

    <div id="loadingSec" style="text-align: center; color: var(--primary);">
        <p>กำลังโหลดข้อมูล...</p>
    </div>

    <div id="searchSec" class="hidden">
        <div class="form-group">
            <label>กรุณากรอกหมายเลขบัตรประชาชน 13 หลัก</label>
            <input type="text" id="idCard" placeholder="0-0000-00000-00-0" oninput="formatID(this)" maxlength="17">
        </div>
        <button class="btn" onclick="searchID()">ค้นหาข้อมูล</button>
    </div>

    <div id="regSec" class="hidden">
        <div id="profileBox" class="card"></div>
        <form id="regForm">
            <div class="form-group">
                <label>ความประสงค์เข้าร่วม</label>
                <select id="attend" required onchange="toggleForm()">
                    <option value="">-- เลือก --</option>
                    <option value="Y">เข้าร่วม</option>
                    <option value="N">ไม่เข้าร่วม</option>
                </select>
            </div>
            <div id="extraForm" class="hidden">
                <div class="form-group"><label>เดินทาง (ขาไป)</label><select id="tGo"><option value="">-- เลือก --</option><option value="รถส่วนตัว">รถส่วนบุคคล</option><option value="รถกรม">รถกรมจัดหาให้</option></select></div>
                <div class="form-group"><label>เดินทาง (ขากลับ)</label><select id="tRet"><option value="">-- เลือก --</option><option value="รถส่วนตัว">รถส่วนบุคคล</option><option value="รถกรม">รถกรมจัดหาให้</option></select></div>
                <div class="form-group"><label>แพ้อาหาร</label><select id="allergy" onchange="document.getElementById('allergyDetail').classList.toggle('hidden', this.value!=='Y')"><option value="N">ไม่แพ้</option><option value="Y">แพ้</option></select></div>
                <input type="text" id="allergyDetail" class="hidden form-group" placeholder="ระบุอาหารที่แพ้">
                <div class="form-group"><label>ประเภทอาหาร</label><select id="food" onchange="document.getElementById('foodDetail').classList.toggle('hidden', this.value!=='อื่นๆ')"><option value="ทั่วไป">ทานได้ทุกอย่าง</option><option value="อิสลาม">อิสลาม</option><option value="มังสวิรัติ">มังสวิรัติ</option><option value="อื่นๆ">อื่นๆ</option></select></div>
                <input type="text" id="foodDetail" class="hidden form-group" placeholder="ระบุเพิ่มเติม">
                <div class="form-group"><label>เบอร์โทรศัพท์</label><input type="tel" id="phone" required></div>
                <div class="form-group"><label>ข้อมูลเพิ่มเติม (ไม่บังคับ)</label><textarea id="extra"></textarea></div>
            </div>
            <button type="button" class="btn" onclick="saveData()">บันทึกข้อมูล</button>
            <button type="button" class="btn btn-outline hidden" id="btnGoMatch" onclick="loadMatchData()">จัดการห้องพัก</button>
        </form>
    </div>

    <div id="matchSec" class="hidden">
        <button class="btn btn-outline refresh-btn" onclick="loadMatchData()">🔄 รีเฟรชข้อมูล</button>
        <h3 class="title" style="margin-bottom: 15px;">ระบบจัดห้องพัก</h3>
        
        <div id="matchStatusBox" class="card"></div>

        <div id="matchActionBox">
            <hr>
            <div class="form-group">
                <label>ค้นหารายชื่อเพื่อขอจับคู่</label>
                <select id="userList" style="margin-bottom:10px;"><option value="">-- เลือกรายชื่อ --</option></select>
                <button class="btn" onclick="sendRequest()">ส่งคำขอจับคู่</button>
            </div>
            
            <div id="reqReceivedBox" style="margin-top: 20px;">
                <label>คำขอจับคู่ที่ได้รับ</label>
                <div id="reqReceivedList">ไม่มีคำขอ</div>
            </div>

            <div id="reqSentBox" style="margin-top: 20px;">
                <label>คำขอที่ส่งไป (รอการตอบรับ)</label>
                <div id="reqSentList">ไม่มีรายการ</div>
            </div>
        </div>
        <button class="btn btn-outline" style="margin-top:20px;" onclick="showSec('regSec')">ย้อนกลับไปแก้ไขข้อมูล</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz4SW3PjipqUdAMCj-IbqJhxTzUPyKq-Qa_5dkserHvu28bIFdFmHmeD5ReDtkjDaqc/exec";
    let myUID = "U_TEST_12345"; // ค่าเริ่มต้นสำหรับเทส หากเชื่อม LIFF ค่านี้จะถูกแทนที่
    let myProfileData = {};

    // 1. เริ่มต้นระบบ (สลับใช้บรรทัดล่างเมื่อมี LIFF ID)
    async function init() {
         await liff.init({ liffId: "2010492833-vdob7H57" });
         if (liff.isLoggedIn()) { myUID = (await liff.getProfile()).userId; }
        
        fetchGAS({ action: "checkUser", uid: myUID }, res => {
            if (res.status === "found") {
                myProfileData = { prefix: res.data[3], name: res.data[4], surname: res.data[5], idCard: res.data[2] };
                fillForm(res.data);
                showSec('regSec');
                Swal.fire({icon: 'success', title: 'พบข้อมูลการลงทะเบียน', timer: 1500, showConfirmButton: false});
            } else {
                showSec('searchSec');
            }
        });
    }

    // 2. ค้นหาบัตร
    function searchID() {
        let idCard = document.getElementById("idCard").value;
        if(idCard.length < 17) return Swal.fire('แจ้งเตือน', 'กรอกบัตรประชาชนให้ครบถ้วน', 'warning');
        
        Swal.fire({title: 'กำลังตรวจสอบ...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }});
        fetchGAS({ action: "searchID", uid: myUID, idCard: idCard }, res => {
            if (res.status === "success") {
                myProfileData = { prefix: res.profile[2], name: res.profile[3], surname: res.profile[4], idCard: idCard };
                document.getElementById("profileBox").innerHTML = `<b>ข้อมูล:</b> ${res.profile[2]}${res.profile[3]} ${res.profile[4]}<br><b>สังกัด:</b> ${res.profile[6]}`;
                showSec('regSec');
                Swal.close();
            } else {
                Swal.fire('ไม่พบข้อมูล', res.message, 'error');
            }
        });
    }

    // 3. บันทึกฟอร์ม
    function saveData() {
        const payload = {
            uid: myUID, idCard: myProfileData.idCard,
            prefix: myProfileData.prefix, name: myProfileData.name, surname: myProfileData.surname,
            attend: document.getElementById("attend").value,
            travelGo: document.getElementById("tGo").value,
            travelReturn: document.getElementById("tRet").value,
            allergy: document.getElementById("allergy").value, allergyDetail: document.getElementById("allergyDetail").value,
            foodType: document.getElementById("food").value, foodDetail: document.getElementById("foodDetail").value,
            phone: document.getElementById("phone").value, extra: document.getElementById("extra").value
        };
        
        if (payload.attend === "Y" && !payload.phone) return Swal.fire('แจ้งเตือน', 'กรุณากรอกเบอร์โทรศัพท์', 'warning');

        Swal.fire({title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }});
        fetchGAS({ action: "saveRegister", payload: payload }, res => {
            if(res.status === "success") {
                Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อย', 'success');
                if(payload.attend === "Y") document.getElementById("btnGoMatch").classList.remove("hidden");
                else document.getElementById("btnGoMatch").classList.add("hidden");
            }
        });
    }

    // 4. โหลดระบบจับคู่
    function loadMatchData() {
        showSec('matchSec');
        Swal.fire({title: 'อัปเดตข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }});
        
        fetchGAS({ action: "getMatchData", uid: myUID }, res => {
            Swal.close();
            if (res.status === "not_eligible") {
                document.getElementById("matchStatusBox").innerHTML = "<p style='color:red;'>ท่านไม่มีสิทธิ์ใช้ระบบจับคู่ (เลือกไม่เข้าร่วม หรือ มีสิทธิ์นอนเดี่ยว)</p>";
                document.getElementById("matchActionBox").style.display = "none";
                return;
            }

            document.getElementById("matchActionBox").style.display = res.profile.matchStatus === "Matched" ? "none" : "block";
            
            if (res.profile.matchStatus === "Matched") {
                document.getElementById("matchStatusBox").innerHTML = `<h3 style='color:green;'>✅ จับคู่สำเร็จ</h3><p>คุณพักคู่กับ: <b>${res.partnerName}</b></p><button class="btn btn-danger" onclick="cancelMatch()">ยกเลิกการจับคู่นี้</button>`;
            } else {
                document.getElementById("matchStatusBox").innerHTML = "<p>สถานะ: <b>ยังไม่มีคู่</b></p>";
                
                // อัปเดต Dropdown
                let userList = `<option value="">-- เลือกรายชื่อ --</option>`;
                if(res.availableUsers.length === 0) userList += `<option value="" disabled>ไม่มีผู้ที่สามารถจับคู่ได้ (อาจยังไม่ลงทะเบียนหรือมีคู่แล้ว)</option>`;
                res.availableUsers.forEach(u => { userList += `<option value="${u.uid}">${u.name}</option>`; });
                document.getElementById("userList").innerHTML = userList;

                // อัปเดตคำขอที่ได้รับ
                let rReq = "";
                res.requestsReceived.forEach(req => {
                    rReq += `<div class="card">${req.name} <button class="btn" style="padding:5px; margin-top:5px; background:green;" onclick="respondReq('${req.fromUID}', 'Accept')">ตอบรับ</button> <button class="btn btn-danger" style="padding:5px; margin-top:5px;" onclick="respondReq('${req.fromUID}', 'Reject')">ปฏิเสธ</button></div>`;
                });
                document.getElementById("reqReceivedList").innerHTML = rReq || "ไม่มีคำขอ";

                // อัปเดตคำขอที่ส่งไป
                let sReq = "";
                res.myRequestsSent.forEach(req => { sReq += `<div class="card">รอการตอบรับจาก: ${req.name}</div>`; });
                document.getElementById("reqSentList").innerHTML = sReq || "ไม่มีรายการ";
            }
        });
    }

    function sendRequest() {
        const toUID = document.getElementById("userList").value;
        if (!toUID) return Swal.fire('แจ้งเตือน', 'กรุณาเลือกรายชื่อ', 'warning');
        
        Swal.fire({title: 'กำลังส่งคำขอ...', didOpen: () => { Swal.showLoading() }});
        fetchGAS({ action: "sendRequest", fromUID: myUID, toUID: toUID }, res => {
            if(res.status === "success") { Swal.fire('สำเร็จ', 'ส่งคำขอแล้ว รอการตอบรับ', 'success'); loadMatchData(); }
        });
    }

    function respondReq(fromUID, response) {
        Swal.fire({title: 'กำลังดำเนินการ...', didOpen: () => { Swal.showLoading() }});
        fetchGAS({ action: "respondRequest", uid: myUID, fromUID: fromUID, response: response }, res => {
            if(res.status === "success") { Swal.fire('สำเร็จ', 'บันทึกการตัดสินใจแล้ว', 'success'); loadMatchData(); }
        });
    }

    function cancelMatch() {
        Swal.fire({ title: 'ยืนยันการยกเลิก?', text: "หากยกเลิก คุณต้องหาคู่ใหม่", icon: 'warning', showCancelButton: true }).then((result) => {
            if (result.isConfirmed) {
                Swal.fire({title: 'กำลังยกเลิก...', didOpen: () => { Swal.showLoading() }});
                fetchGAS({ action: "cancelMatch", uid: myUID }, res => {
                    if(res.status === "success") { Swal.fire('สำเร็จ', 'ยกเลิกการจับคู่แล้ว', 'success'); loadMatchData(); }
                });
            }
        });
    }

    // Utils
    function fetchGAS(data, callback) {
        fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) })
        .then(r => r.json()).then(callback).catch(e => { Swal.fire('ข้อผิดพลาด', 'เชื่อมต่อระบบล้มเหลว', 'error'); });
    }
    function formatID(obj) {
        let val = obj.value.replace(/\D/g, ''); let f = '';
        if (val.length > 0) f += val.substring(0, 1) + (val.length > 1 ? '-' : '');
        if (val.length > 1) f += val.substring(1, 5) + (val.length > 5 ? '-' : '');
        if (val.length > 5) f += val.substring(5, 10) + (val.length > 10 ? '-' : '');
        if (val.length > 10) f += val.substring(10, 12) + (val.length > 12 ? '-' : '');
        if (val.length > 12) f += val.substring(12, 13);
        obj.value = f;
    }
    function showSec(id) { ['loadingSec','searchSec','regSec','matchSec'].forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
    function toggleForm() { document.getElementById("extraForm").classList.toggle("hidden", document.getElementById("attend").value !== "Y"); }
    function fillForm(data) {
        document.getElementById("profileBox").innerHTML = `<b>ข้อมูล:</b> ${data[3]}${data[4]} ${data[5]}`;
        document.getElementById("attend").value = data[6]; toggleForm();
        document.getElementById("tGo").value = data[7]; document.getElementById("tRet").value = data[8];
        document.getElementById("allergy").value = data[9]; if(data[9]==='Y') document.getElementById('allergyDetail').classList.remove('hidden'); document.getElementById("allergyDetail").value = data[10];
        document.getElementById("food").value = data[11]; if(data[11]==='อื่นๆ') document.getElementById('foodDetail').classList.remove('hidden'); document.getElementById("foodDetail").value = data[12];
        document.getElementById("phone").value = data[13].replace("'", ""); // ตัด ' ออกเวลาแสดงผล
        document.getElementById("extra").value = data[14];
        if(data[6]==="Y") document.getElementById("btnGoMatch").classList.remove("hidden");
    }

    window.onload = init;
</script>
</body>
</html>
