<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนสัมมนา - กรมทรัพยากรน้ำ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
            min-height: 100vh;
        }
        .water-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-top: 4px solid #00acc1;
        }
    </style>
</head>
<body class="p-4">

    <div id="app" class="max-w-md mx-auto water-card rounded-2xl shadow-xl overflow-hidden hidden">
        <div class="text-center p-6 bg-white">
            <img src="https://dwr.go.th/uploads/userfiles/images/Logodwr.png" alt="DWR Logo" class="h-20 mx-auto drop-shadow-md">
            <h2 class="mt-4 text-xl font-bold text-cyan-800">ลงทะเบียนร่วมงานสัมมนา</h2>
            <p class="text-sm text-cyan-600">กรมทรัพยากรน้ำ</p>
        </div>

        <div class="p-6">
            <div id="loader" class="text-center py-4">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-cyan-700 mx-auto"></div>
                <p class="mt-2 text-cyan-700">กำลังตรวจสอบข้อมูล...</p>
            </div>

            <div id="step1" class="hidden space-y-4">
                <div class="bg-cyan-50 p-4 rounded-lg border border-cyan-100">
                    <p class="text-sm text-gray-600">ชื่อ-สกุล: <span id="uName" class="font-bold text-gray-800"></span></p>
                    <p class="text-sm text-gray-600">ตำแหน่ง: <span id="uPos"></span></p>
                    <p class="text-sm text-gray-600">สังกัด: <span id="uDept"></span></p>
                </div>

                <form id="regForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700">1. ความประสงค์เข้าร่วม <span class="text-red-500">*</span></label>
                        <select id="attend" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-cyan-500">
                            <option value="">-- กรุณาเลือก --</option>
                            <option value="Y">เข้าร่วม</option>
                            <option value="N">ไม่เข้าร่วม</option>
                        </select>
                    </div>

                    <div id="attendDetails" class="space-y-4 hidden">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700">2. การเดินทาง <span class="text-red-500">*</span></label>
                            <div class="grid grid-cols-2 gap-2 mt-1">
                                <select id="travelGo" class="rounded-md border p-2 text-sm"><option value="">-- ขาไป --</option><option value="Car">รถส่วนตัว</option><option value="Van">รถส่วนกลาง</option></select>
                                <select id="travelBack" class="rounded-md border p-2 text-sm"><option value="">-- ขากลับ --</option><option value="Car">รถส่วนตัว</option><option value="Van">รถส่วนกลาง</option></select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700">3. การแพ้อาหาร <span class="text-red-500">*</span></label>
                            <select id="allergy" class="mt-1 block w-full rounded-md border p-2" onchange="toggleInput('allergy', 'allergyNote')">
                                <option value="">-- กรุณาเลือก --</option>
                                <option value="N">ไม่แพ้</option>
                                <option value="Y">แพ้ (โปรดระบุ)</option>
                            </select>
                            <input type="text" id="allergyNote" placeholder="ระบุอาหารที่แพ้" class="mt-2 w-full border rounded p-2 hidden">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700">4. ประเภทอาหาร <span class="text-red-500">*</span></label>
                            <select id="food" class="mt-1 block w-full rounded-md border p-2" onchange="toggleInput('food', 'foodNote', 'Other')">
                                <option value="">-- กรุณาเลือก --</option>
                                <option value="All">ทานได้ทุกอย่าง</option>
                                <option value="Halal">อิสลาม (ฮาลาล)</option>
                                <option value="Veg">มังสวิรัติ</option>
                                <option value="Other">อื่น ๆ</option>
                            </select>
                            <input type="text" id="foodNote" placeholder="โปรดระบุ" class="mt-2 w-full border rounded p-2 hidden">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700">5. เบอร์โทรศัพท์มือถือ <span class="text-red-500">*</span></label>
                            <input type="tel" id="phone" required maxlength="10" placeholder="08xxxxxxxx" class="mt-1 block w-full rounded-md border p-2">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700">6. ข้อมูลเพิ่มเติม (ถ้ามี)</label>
                            <textarea id="note" rows="2" class="mt-1 block w-full rounded-md border p-2"></textarea>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-cyan-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-cyan-700 transition shadow-lg">
                        บันทึกข้อมูล
                    </button>
                </form>
            </div>

            <div id="step2" class="hidden space-y-4 mt-6 border-t pt-4">
                <h3 class="font-bold text-lg text-cyan-800">ระบบจัดการห้องพัก</h3>
                <div id="roomMsg" class="text-sm bg-blue-50 p-3 rounded text-blue-700"></div>
                
                <div id="matchingPanel" class="hidden">
                    <p class="text-sm mb-2">ค้นหาชื่อเพื่อขอจับคู่นอน:</p>
                    <div class="flex gap-2">
                        <input type="text" id="searchPartner" placeholder="พิมพ์ชื่อ-สกุล" class="border rounded p-2 w-full text-sm">
                        <button class="bg-blue-500 text-white px-4 rounded text-sm">ค้นหา</button>
                    </div>
                    </div>
            </div>

        </div>
    </div>

    <script>
        const LIFF_ID = "2010492833-vdob7H57";
        const API_URL = "https://script.google.com/macros/s/AKfycbz4SW3PjipqUdAMCj-IbqJhxTzUPyKq-Qa_5dkserHvu28bIFdFmHmeD5ReDtkjDaqc/exec";
        let userUID = "";
        let sysConfig = {};

        // 1. Initialize LIFF
        async function main() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }
            const profile = await liff.getProfile();
            userUID = profile.userId;
            document.getElementById('app').classList.remove('hidden');
            checkUser();
        }

        // 2. ฟังก์ชันตรวจสอบผู้ใช้
        async function checkUser() {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "checkUser", data: { uid: userUID } })
                }).then(r => r.json());

                document.getElementById('loader').classList.add('hidden');
                
                if (res.data.userInfo) {
                    // เคยมีข้อมูลใน Database แล้ว (ผ่านการยืนยัน ID Card แล้ว)
                    setupUserUI(res.data.userInfo, res.data.regData);
                } else {
                    // ไม่พบข้อมูล ต้องกรอกบัตรประชาชน
                    promptIDCard();
                }
            } catch (err) {
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อระบบได้', 'error');
            }
        }

        // 3. Popup บัตรประชาชน พร้อม Masking (0-0000-00000-00-0)
        function promptIDCard() {
            Swal.fire({
                title: 'ไม่พบประวัติการลงทะเบียน',
                text: 'กรุณากรอกเลขบัตรประจำตัวประชาชน 13 หลัก',
                input: 'text',
                inputAttributes: { maxlength: 17, placeholder: '0-0000-00000-00-0', id: 'swal-id-card' },
                allowOutsideClick: false,
                confirmButtonText: 'ตรวจสอบข้อมูล',
                didOpen: () => {
                    // Masking Script
                    const input = document.getElementById('swal-id-card');
                    input.addEventListener('input', function(e) {
                        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,1})(\d{0,4})(\d{0,5})(\d{0,2})(\d{0,1})/);
                        e.target.value = !x[2] ? x[1] : x[1] + '-' + x[2] + (x[3] ? '-' + x[3] : '') + (x[4] ? '-' + x[4] : '') + (x[5] ? '-' + x[5] : '');
                    });
                },
                preConfirm: (value) => {
                    if (value.length !== 17) Swal.showValidationMessage('กรุณากรอกให้ครบ 13 หลัก');
                    return value;
                }
            }).then((result) => {
                if (result.isConfirmed) verifyID(result.value);
            });
        }

        async function verifyID(idCard) {
            Swal.fire({ title: 'กำลังตรวจสอบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const res = await fetch(API_URL, {
                method: 'POST', body: JSON.stringify({ action: "verifyIDCard", data: { idCard: idCard, uid: userUID } })
            }).then(r => r.json());

            if (res.data.found) {
                Swal.fire('สำเร็จ', `ยินดีต้อนรับ คุณ${res.data.name}`, 'success').then(() => {
                    checkUser(); // โหลดใหม่
                });
            } else {
                Swal.fire('ไม่พบข้อมูล', 'ไม่พบหมายเลขบัตรนี้ในระบบฐานข้อมูล', 'error').then(() => promptIDCard());
            }
        }

        // UI Helpers
        function toggleInput(selectId, inputId, triggerValue = 'Y') {
            const el = document.getElementById(inputId);
            document.getElementById(selectId).value === triggerValue ? el.classList.remove('hidden') : el.classList.add('hidden');
        }

        document.getElementById('attend').addEventListener('change', function(e) {
            const details = document.getElementById('attendDetails');
            const step2 = document.getElementById('step2');
            if (e.target.value === 'Y') {
                details.classList.remove('hidden');
                step2.classList.remove('hidden'); // แสดง Step 2 ถ้าลงทะเบียนแล้ว
            } else {
                details.classList.add('hidden');
                step2.classList.add('hidden');
                // หากเปลี่ยนเป็นไม่เข้า ให้เพิ่มแจ้งเตือนเรื่องการยกเลิกคู่นอนที่นี่
                if(document.getElementById('step1').dataset.isEdit === "true") {
                     Swal.fire('คำเตือน', 'การเปลี่ยนสถานะเป็นไม่เข้าร่วม จะยกเลิกการจับคู่นอนทั้งหมดของคุณ', 'warning');
                }
            }
        });

        function setupUserUI(userInfo, regData) {
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('uName').innerText = `${userInfo.prefix}${userInfo.fname} ${userInfo.lname}`;
            document.getElementById('uPos').innerText = userInfo.position;
            document.getElementById('uDept').innerText = userInfo.dept;

            if (regData) {
                // เติมข้อมูลเก่า (Edit Mode)
                document.getElementById('step1').dataset.isEdit = "true";
                document.getElementById('attend').value = regData.attend;
                document.getElementById('attend').dispatchEvent(new Event('change'));
                document.getElementById('travelGo').value = regData.go;
                document.getElementById('travelBack').value = regData.back;
                document.getElementById('allergy').value = regData.allergy;
                document.getElementById('allergy').dispatchEvent(new Event('change'));
                document.getElementById('allergyNote').value = regData.allergyNote;
                document.getElementById('food').value = regData.food;
                document.getElementById('food').dispatchEvent(new Event('change'));
                document.getElementById('foodNote').value = regData.foodNote;
                document.getElementById('phone').value = regData.phone;
                document.getElementById('note').value = regData.note;
            }

            // Step 2 Logic
            const step2 = document.getElementById('step2');
            const roomMsg = document.getElementById('roomMsg');
            const matchPanel = document.getElementById('matchingPanel');

            if (regData && regData.attend === 'Y') {
                step2.classList.remove('hidden');
                if (userInfo.singleRoom === 'Y') {
                    roomMsg.innerHTML = "<b>คุณได้รับสิทธิ์พักเดี่ยว</b> ไม่จำเป็นต้องจับคู่นอน";
                    matchPanel.classList.add('hidden');
                } else {
                    roomMsg.innerHTML = "กรุณาเลือกระบุชื่อบุคคลที่ท่านประสงค์จะจับคู่นอนด้วย";
                    matchPanel.classList.remove('hidden');
                    // โหลดข้อมูล Matching แบบ Realtime (Trade System) ผ่าน Fetch API
                }
            }
        }

        // Form Submit
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                uid: userUID,
                attend: document.getElementById('attend').value,
                go: document.getElementById('travelGo').value,
                back: document.getElementById('travelBack').value,
                allergy: document.getElementById('allergy').value,
                allergyNote: document.getElementById('allergyNote').value,
                food: document.getElementById('food').value,
                foodNote: document.getElementById('foodNote').value,
                phone: document.getElementById('phone').value,
                note: document.getElementById('note').value,
            };

            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            const res = await fetch(API_URL, {
                method: 'POST', body: JSON.stringify({ action: "register", data: payload })
            }).then(r => r.json());

            if (res.status === "success") {
                Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อย', 'success');
                // ปิด/ย่อ Step 1 ตาม Requirement
            } else {
                Swal.fire('แจ้งเตือน', res.message, 'warning'); // เช่น แจ้งเตือนหมดเวลา
            }
        });

        main();
    </script>
</body>
</html>
