<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ลงทะเบียนสัมมนา - กรมทรัพยากรน้ำ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: linear-gradient(180deg, #e0f2fe 0%, #bae6fd 100%); min-height: 100vh;}
        .wave-bg { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%230284c7" fill-opacity="0.1" d="M0,192L48,197.3C96,203,192,213,288,229.3C384,245,480,267,576,250.7C672,235,768,181,864,165.3C960,149,1056,171,1152,192C1248,213,1344,235,1392,245.3L1440,256L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>'); background-position: bottom; background-repeat: no-repeat; background-size: cover;}
    </style>
</head>
<body class="wave-bg pb-10">

<div class="max-w-md mx-auto pt-8 px-4">
    <div class="text-center mb-6 bg-white rounded-2xl shadow-lg p-4">
        <img src="https://dwr.go.th/uploads/userfiles/images/Logodwr.png" alt="DWR Logo" class="h-20 mx-auto mb-2 drop-shadow-md">
        <h1 class="text-xl font-bold text-cyan-800">ระบบลงทะเบียนสัมมนา</h1>
        <p class="text-sm text-cyan-600">และการจัดการห้องพัก กรมทรัพยากรน้ำ</p>
    </div>

    <div id="loading" class="text-center py-10 bg-white/80 rounded-xl">
        <i class="fas fa-spinner fa-spin text-4xl text-cyan-600"></i>
        <p class="mt-3 text-cyan-800">กำลังตรวจสอบข้อมูล...</p>
    </div>

    <div id="main-content" class="hidden">
        
        <div id="step-1" class="bg-white rounded-2xl shadow-lg p-5 mb-6 border-t-4 border-cyan-500">
            <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center justify-between">
                <span><i class="fas fa-file-signature text-cyan-500 mr-2"></i> Step 1: ข้อมูลส่วนตัว</span>
                <button id="toggle-step1" class="text-gray-400 hidden"><i class="fas fa-chevron-down"></i></button>
            </h2>
            
            <div id="form-body">
                <div id="user-info" class="bg-cyan-50 p-3 rounded-lg mb-4 text-sm text-cyan-900 shadow-inner hidden"></div>
                
                <form id="regForm" onsubmit="submitForm(event)">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">1. ความประสงค์เข้าร่วมกิจกรรม <span class="text-red-500">*</span></label>
                        <select id="attend" required class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-cyan-500 focus:border-cyan-500 p-2 border" onchange="toggleFormRequirements()">
                            <option value="">-- กรุณาเลือก --</option>
                            <option value="Y">เข้าร่วมกิจกรรม</option>
                            <option value="N">ไม่เข้าร่วม</option>
                        </select>
                    </div>

                    <div id="dynamic-fields">
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">2. การเดินทาง <span class="text-red-500">*</span></label>
                            <div class="grid grid-cols-2 gap-2 text-sm">
                                <div>
                                    <span class="block mb-1 text-xs text-gray-500">ขาไป</span>
                                    <select id="travelGo" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border">
                                        <option value="">-- เลือก --</option>
                                        <option value="ส่วนตัว">รถยนต์ส่วนบุคคล</option>
                                        <option value="กรมจัดให้">รถกรมจัดหาให้</option>
                                    </select>
                                </div>
                                <div>
                                    <span class="block mb-1 text-xs text-gray-500">ขากลับ</span>
                                    <select id="travelReturn" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border">
                                        <option value="">-- เลือก --</option>
                                        <option value="ส่วนตัว">รถยนต์ส่วนบุคคล</option>
                                        <option value="กรมจัดให้">รถกรมจัดหาให้</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">3. การแพ้อาหาร <span class="text-red-500">*</span></label>
                            <select id="allergy" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border" onchange="toggleBox('allergy', 'allergyBox')">
                                <option value="">-- กรุณาเลือก --</option>
                                <option value="ไม่แพ้">ไม่แพ้</option>
                                <option value="แพ้">แพ้ (โปรดระบุ)</option>
                            </select>
                            <input type="text" id="allergyBox" class="mt-2 w-full border-gray-300 rounded-lg shadow-sm p-2 border hidden" placeholder="ระบุสิ่งที่แพ้">
                        </div>

                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">4. ข้อมูลอาหาร <span class="text-red-500">*</span></label>
                            <select id="foodType" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border" onchange="toggleBox('foodType', 'foodBox', 'อื่น ๆ')">
                                <option value="">-- กรุณาเลือก --</option>
                                <option value="ทานได้ทุกอย่าง">ทานได้ทุกอย่าง</option>
                                <option value="อิสลาม">อิสลาม</option>
                                <option value="มังสวิรัติ">มังสวิรัติ</option>
                                <option value="อื่น ๆ">อื่น ๆ (โปรดระบุ)</option>
                            </select>
                            <input type="text" id="foodBox" class="mt-2 w-full border-gray-300 rounded-lg shadow-sm p-2 border hidden" placeholder="ระบุข้อมูลอาหาร">
                        </div>

                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">5. เบอร์โทรศัพท์ <span class="text-red-500">*</span></label>
                            <input type="tel" id="phone" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border" placeholder="08XXXXXXXX" maxlength="10">
                        </div>
                    </div> <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">6. ข้อมูลเพิ่มเติม (ถ้ามี)</label>
                        <textarea id="note" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border" rows="2"></textarea>
                    </div>

                    <button type="submit" class="w-full bg-cyan-600 text-white font-bold py-3 rounded-xl shadow hover:bg-cyan-700 transition">
                        <i class="fas fa-save mr-1"></i> บันทึกข้อมูล
                    </button>
                </form>
            </div>
        </div>

        <div id="step-2" class="bg-white rounded-2xl shadow-lg p-5 border-t-4 border-indigo-500 hidden">
            <h2 class="text-lg font-bold text-indigo-800 mb-4"><i class="fas fa-bed text-indigo-500 mr-2"></i> Step 2: จับคู่นอนห้องพัก</h2>
            
            <div id="match-status" class="bg-indigo-50 p-4 rounded-lg mb-4 text-center hidden border border-indigo-100">
                </div>

            <div id="pair-action-area">
                <label class="block text-sm font-medium text-gray-700 mb-1">ค้นหารายชื่อเพื่อนที่ต้องการจับคู่</label>
                <div class="flex space-x-2 mb-2">
                    <input type="text" id="searchName" class="w-full border-gray-300 rounded-lg p-2 border" placeholder="พิมพ์ชื่อเพื่อค้นหา...">
                    <button type="button" onclick="searchUser()" class="bg-indigo-500 text-white px-4 rounded-lg"><i class="fas fa-search"></i></button>
                </div>
                <p class="text-xs text-gray-500 mb-4">* หากรายชื่อไม่ปรากฏ บุคคลที่ท่านกำลังค้นหาอาจยังไม่ลงทะเบียน ไม่เข้าร่วมกิจกรรมนี้ หรือจับคู่นอนไปเรียบร้อยแล้ว</p>
                <ul id="search-results" class="bg-white border rounded-lg divide-y hidden"></ul>
            </div>
            
            <div id="incoming-requests" class="mt-6 hidden">
                <h3 class="text-sm font-bold text-gray-700 mb-2 border-b pb-1">มีผู้ขอจับคู่กับคุณ</h3>
                <ul id="req-list" class="space-y-2"></ul>
            </div>
        </div>
    </div>
</div>

<script>
    // Config
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbz4SW3PjipqUdAMCj-IbqJhxTzUPyKq-Qa_5dkserHvu28bIFdFmHmeD5ReDtkjDaqc/exec';
    const LIFF_ID = '2010492833-vdob7H57';
    
    // State
    let userUid = '';
    let userData = {};
    let isSingleRoom = 'N';
    let fullNameStr = '';
    let pollingInterval;

    // 1. Initialize LIFF
    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                userUid = profile.userId;
                checkRegistration();
            } else {
                liff.login();
            }
        } catch (err) {
            Swal.fire('Error', 'ไม่สามารถเชื่อมต่อ LIFF ได้', 'error');
        }
    }

    // 2. API Helper
    async function callGAS(payload) {
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        return await response.json();
    }

    // 3. Check System / Registration
    async function checkRegistration() {
        Swal.showLoading();
        const res = await callGAS({ action: 'checkUser', uid: userUid });
        Swal.close();

        if(!res.data.timeCheck.isOpen) {
            Swal.fire('แจ้งเตือน', res.data.timeCheck.message, 'warning');
            return;
        }

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');

        if (res.data.registered) {
            // โหลดข้อมูลเก่ามาใส่ฟอร์ม
            let d = res.data.data;
            isSingleRoom = res.data.singleRoom;
            fullNameStr = d[3];
            
            document.getElementById('user-info').innerHTML = `<b>ข้อมูลของคุณ:</b> ${fullNameStr}<br>สถานะ: ลงทะเบียนแล้ว (แก้ไขได้)`;
            document.getElementById('user-info').classList.remove('hidden');

            document.getElementById('attend').value = d[4];
            document.getElementById('travelGo').value = d[5];
            document.getElementById('travelReturn').value = d[6];
            document.getElementById('allergy').value = d[7];
            document.getElementById('allergyBox').value = d[8] || '';
            document.getElementById('foodType').value = d[9];
            document.getElementById('foodBox').value = d[10] || '';
            document.getElementById('phone').value = d[11] ? d[11].replace(/'/g, '') : '';
            document.getElementById('note').value = d[12] || '';
            
            toggleFormRequirements();
            toggleBox('allergy', 'allergyBox');
            toggleBox('foodType', 'foodBox', 'อื่น ๆ');

            checkStep2Logic();
        } else {
            promptIDCard();
        }
    }

    // 4. ID Card Mask & Validation
    function promptIDCard() {
        Swal.fire({
            title: 'ตรวจสอบสิทธิ์',
            html: '<p class="text-sm mb-2 text-gray-600">กรุณากรอกเลขบัตรประชาชน 13 หลัก</p><input id="swal-id" class="swal2-input text-center" placeholder="X-XXXX-XXXXX-XX-X" maxlength="17">',
            confirmButtonText: 'ตรวจสอบ',
            allowOutsideClick: false,
            didOpen: () => {
                const input = document.getElementById('swal-id');
                input.addEventListener('input', function(e) {
                    let x = e.target.value.replace(/\D/g, '').match(/(\d{0,1})(\d{0,4})(\d{0,5})(\d{0,2})(\d{0,1})/);
                    e.target.value = !x[2] ? x[1] : x[1] + '-' + x[2] + (x[3] ? '-' + x[3] : '') + (x[4] ? '-' + x[4] : '') + (x[5] ? '-' + x[5] : '');
                });
            },
            preConfirm: () => {
                return document.getElementById('swal-id').value;
            }
        }).then(async (result) => {
            if (result.isConfirmed) {
                Swal.showLoading();
                const res = await callGAS({ action: 'validateID', idCard: result.value, uid: userUid });
                if (res.data.found) {
                    let info = res.data.info;
                    userData.idCard = result.value;
                    fullNameStr = `${info.prefix}${info.fname} ${info.lname}`;
                    isSingleRoom = info.single;
                    
                    document.getElementById('user-info').innerHTML = `<b>ยืนยันตัวตนสำเร็จ:</b> ${fullNameStr}<br>ตำแหน่ง: ${info.pos} | สังกัด: ${info.dept}`;
                    document.getElementById('user-info').classList.remove('hidden');
                    Swal.fire('สำเร็จ', 'ตรวจสอบพบข้อมูลในระบบ', 'success');
                } else {
                    Swal.fire('ไม่พบข้อมูล', 'กรุณาติดต่อเจ้าหน้าที่', 'error').then(() => promptIDCard());
                }
            }
        });
    }

    // 5. Form Interactions
    function toggleFormRequirements() {
        const attend = document.getElementById('attend').value;
        const dynFields = document.getElementById('dynamic-fields');
        const reqFields = ['travelGo', 'travelReturn', 'allergy', 'foodType', 'phone'];
        
        if (attend === 'N') {
            dynFields.classList.add('hidden');
            reqFields.forEach(id => document.getElementById(id).removeAttribute('required'));
            if(isSingleRoom === 'N') document.getElementById('step-2').classList.add('hidden'); // ซ่อน step 2 ถ้ายกเลิก
        } else {
            dynFields.classList.remove('hidden');
            reqFields.forEach(id => document.getElementById(id).setAttribute('required', 'required'));
            checkStep2Logic();
        }
    }

    function toggleBox(selectId, boxId, targetValue = 'แพ้') {
        const val = document.getElementById(selectId).value;
        const box = document.getElementById(boxId);
        if (val === targetValue) { box.classList.remove('hidden'); box.setAttribute('required', 'required'); } 
        else { box.classList.add('hidden'); box.removeAttribute('required'); box.value = ''; }
    }

    // 6. Submit Data
    async function submitForm(e) {
        e.preventDefault();
        
        // แจ้งเตือนถ้ายกเลิกการเข้าร่วม
        const isAttend = document.getElementById('attend').value === 'Y';
        if(!isAttend) {
            const confirm = await Swal.fire({
                title: 'ยืนยันการไม่เข้าร่วม?',
                text: "หากคุณมีคู่จับนอนแล้ว การจับคู่จะถูกยกเลิกด้วย",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'ยืนยัน'
            });
            if(!confirm.isConfirmed) return;
        }

        const data = {
            uid: userUid,
            idCard: userData.idCard || '',
            fullName: fullNameStr,
            attend: document.getElementById('attend').value,
            travelGo: document.getElementById('travelGo').value,
            travelReturn: document.getElementById('travelReturn').value,
            allergy: document.getElementById('allergy').value,
            allergyDesc: document.getElementById('allergyBox').value,
            foodType: document.getElementById('foodType').value,
            foodDesc: document.getElementById('foodBox').value,
            phone: document.getElementById('phone').value,
            note: document.getElementById('note').value
        };

        Swal.fire({title: 'กำลังบันทึก...', allowOutsideClick: false});
        Swal.showLoading();
        
        const res = await callGAS({ action: 'saveRegister', data: data });
        if(res.success) {
            Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อยแล้ว', 'success');
            // ยุบ Form 1
            document.getElementById('form-body').classList.add('hidden');
            document.getElementById('toggle-step1').classList.remove('hidden');
            document.getElementById('toggle-step1').onclick = () => document.getElementById('form-body').classList.toggle('hidden');
            
            checkStep2Logic();
        }
    }

    // 7. Step 2 Logic
    function checkStep2Logic() {
        const attend = document.getElementById('attend').value;
        if(attend === 'Y' && isSingleRoom === 'N') {
            document.getElementById('step-2').classList.remove('hidden');
            startPairingPolling();
        } else {
            document.getElementById('step-2').classList.add('hidden');
            stopPairingPolling();
        }
    }

    // 8. Pairing System
    async function searchUser() {
        const keyword = document.getElementById('searchName').value.trim();
        if(!keyword) return;
        
        Swal.showLoading();
        const res = await callGAS({ action: 'searchPair', keyword: keyword, uid: userUid });
        Swal.close();
        
        const ul = document.getElementById('search-results');
        ul.innerHTML = '';
        if(res.data.length === 0) {
            ul.innerHTML = '<li class="p-3 text-center text-sm text-gray-500">ไม่พบรายชื่อที่สามารถจับคู่ได้</li>';
        } else {
            res.data.forEach(user => {
                ul.innerHTML += `<li class="p-3 flex justify-between items-center text-sm">
                    <span>${user.name}</span>
                    <button onclick="requestPair('${user.uid}', '${user.name}')" class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded hover:bg-indigo-200">ขอจับคู่</button>
                </li>`;
            });
        }
        ul.classList.remove('hidden');
    }

    async function requestPair(targetUid, name) {
        const conf = await Swal.fire({ text: `ส่งคำขอจับคู่ถึง ${name}?`, showCancelButton: true });
        if(conf.isConfirmed) {
            Swal.showLoading();
            await callGAS({ action: 'requestPair', myUid: userUid, targetUid: targetUid });
            Swal.fire('สำเร็จ', 'ส่งคำขอแล้ว กรุณารอการตอบรับ', 'success');
            document.getElementById('search-results').classList.add('hidden');
            fetchPairStatus();
        }
    }

    async function respondPair(targetUid, status) {
        Swal.showLoading();
        await callGAS({ action: 'respondPair', myUid: userUid, targetUid: targetUid, responseStatus: status });
        Swal.close();
        fetchPairStatus();
    }

    // Real-time Polling
    function startPairingPolling() {
        fetchPairStatus();
        if(!pollingInterval) pollingInterval = setInterval(fetchPairStatus, 10000); // Check every 10s
    }
    function stopPairingPolling() {
        if(pollingInterval) clearInterval(pollingInterval);
    }

    async function fetchPairStatus() {
        const res = await callGAS({ action: 'getPairStatus', uid: userUid });
        const data = res.data;
        const statusBox = document.getElementById('match-status');
        const actionArea = document.getElementById('pair-action-area');
        const reqArea = document.getElementById('incoming-requests');
        const reqList = document.getElementById('req-list');

        if(data.matched) {
            statusBox.innerHTML = `<i class="fas fa-check-circle text-green-500 text-3xl mb-2"></i><br><b class="text-green-700">จับคู่สำเร็จ</b><br>รูมเมทของคุณคือ: ${data.matched.partnerName}`;
            statusBox.classList.remove('hidden');
            actionArea.classList.add('hidden');
            reqArea.classList.add('hidden');
        } else {
            statusBox.classList.add('hidden');
            actionArea.classList.remove('hidden');
            
            // Pending I sent
            if(data.myRequests.length > 0) {
                statusBox.innerHTML = `<i class="fas fa-hourglass-half text-orange-500 text-3xl mb-2"></i><br><span class="text-orange-700">รอการตอบรับจาก: ${data.myRequests.map(r=>r.name).join(', ')}</span>`;
                statusBox.classList.remove('hidden');
            }

            // Incoming requests
            if(data.incomingRequests.length > 0) {
                reqArea.classList.remove('hidden');
                reqList.innerHTML = '';
                data.incomingRequests.forEach(req => {
                    reqList.innerHTML += `<li class="bg-indigo-50 border p-3 rounded-lg flex justify-between items-center shadow-sm">
                        <span class="text-sm font-medium">${req.name}</span>
                        <div class="space-x-1">
                            <button onclick="respondPair('${req.uid}', 'Accepted')" class="bg-green-500 text-white px-2 py-1 rounded text-xs"><i class="fas fa-check"></i> รับ</button>
                            <button onclick="respondPair('${req.uid}', 'Rejected')" class="bg-red-500 text-white px-2 py-1 rounded text-xs"><i class="fas fa-times"></i> ปฏิเสธ</button>
                        </div>
                    </li>`;
                });
            } else {
                reqArea.classList.add('hidden');
            }
        }
    }

    // Start App
    window.onload = init;
</script>
</body>
</html>
