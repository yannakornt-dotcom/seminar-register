<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบลงทะเบียน - กรมทรัพยากรน้ำ</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: 'Sarabun', sans-serif; background: linear-gradient(135deg, #e0f7fa 0%, #80deea 100%); min-height: 100vh; }
    .card-water { border-radius: 15px; border: none; box-shadow: 0 8px 20px rgba(0, 139, 139, 0.15); background: rgba(255,255,255,0.95); margin-bottom: 20px;}
    .header-logo { max-width: 120px; margin: 20px auto; display: block; filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.1)); }
    .btn-dwr { background-color: #00838f; color: white; border-radius: 20px; transition: 0.3s; }
    .btn-dwr:hover { background-color: #006064; color: white;}
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #00acc1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: auto;}
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container py-4">
    <img src="https://dwr.go.th/uploads/userfiles/images/Logodwr.png" alt="DWR Logo" class="header-logo">
    <h4 class="text-center text-dark mb-4 fw-bold">ระบบลงทะเบียนเข้าร่วมสัมมนา<br>กรมทรัพยากรน้ำ</h4>

    <div id="loading" class="text-center py-5"><div class="loader"></div><p class="mt-3">กำลังเชื่อมต่อข้อมูล...</p></div>

    <div id="step1" class="card card-water d-none">
      <div class="card-body">
        <h5 class="card-title fw-bold text-primary border-bottom pb-2">Step 1: ข้อมูลส่วนตัว</h5>
        <form id="regForm">
          <div class="mb-3">
            <label class="form-label text-muted">ชื่อ-สกุล / ตำแหน่ง (ดึงจากฐานข้อมูล)</label>
            <input type="text" id="displayInfo" class="form-control" readonly>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">ความประสงค์เข้าร่วมกิจกรรม <span class="text-danger">*</span></label>
            <select class="form-select" id="joinStatus" required>
              <option value="">-- กรุณาเลือก --</option>
              <option value="เข้าร่วม">เข้าร่วม</option>
              <option value="ไม่เข้าร่วม">ไม่เข้าร่วม</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">การเดินทาง <span class="text-danger">*</span></label>
            <select class="form-select" id="travel" required>
              <option value="">-- กรุณาเลือก --</option>
              <option value="รถยนต์ส่วนบุคคล">รถยนต์ส่วนบุคคล</option>
              <option value="รถที่กรมจัดหาให้">รถที่กรมจัดหาให้</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">การแพ้อาหาร <span class="text-danger">*</span></label>
            <select class="form-select" id="allergy" onchange="toggleInput('allergy', 'allergyNote')" required>
              <option value="">-- กรุณาเลือก --</option>
              <option value="ไม่แพ้">ไม่แพ้</option>
              <option value="แพ้">แพ้</option>
            </select>
            <input type="text" id="allergyNote" class="form-control mt-2 d-none" placeholder="โปรดระบุอาหารที่แพ้">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">ข้อมูลอาหาร <span class="text-danger">*</span></label>
            <select class="form-select" id="food" onchange="toggleInput('food', 'foodNote', 'อื่นๆ')" required>
              <option value="">-- กรุณาเลือก --</option>
              <option value="ทานได้ทุกอย่าง">ทานได้ทุกอย่าง</option>
              <option value="อิสลาม">อิสลาม</option>
              <option value="มังสวิรัติ">มังสวิรัติ</option>
              <option value="อื่นๆ">อื่น ๆ</option>
            </select>
            <input type="text" id="foodNote" class="form-control mt-2 d-none" placeholder="โปรดระบุ">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">เบอร์โทรศัพท์ <span class="text-danger">*</span></label>
            <input type="tel" id="phone" class="form-control" required pattern="[0-9]{10}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">หมายเหตุเพิ่มเติม</label>
            <textarea id="note" class="form-control" rows="2"></textarea>
          </div>
          <button type="submit" class="btn btn-dwr w-100 fw-bold">บันทึกข้อมูล Step 1</button>
        </form>
      </div>
    </div>

    <div id="step2" class="card card-water d-none mt-3">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
          <h5 class="card-title fw-bold text-primary m-0">Step 2: จัดการห้องพัก (จับคู่นอน)</h5>
          <button class="btn btn-sm btn-outline-secondary" onclick="toggleStep1()">แก้ไข Step 1</button>
        </div>
        
        <div id="matchState"></div>

        <hr>
        <h6 class="fw-bold">ค้นหาบุคคลเพื่อจับคู่</h6>
        <div class="input-group mb-3">
          <input type="text" id="searchName" class="form-control" placeholder="ค้นหาชื่อ-สกุล">
          <button class="btn btn-dwr" onclick="searchUser()">ค้นหา</button>
        </div>
        <div id="searchResults" class="list-group"></div>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz4SW3PjipqUdAMCj-IbqJhxTzUPyKq-Qa_5dkserHvu28bIFdFmHmeD5ReDtkjDaqc/exec";
    const LIFF_ID = "2010492833-vdob7H57";
    let userUid = "";
    let userData = {};
    let pollInterval;

    async function init() {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile = await liff.getProfile();
      userUid = profile.userId;
      
      const res = await apiCall({ action: "checkUser", uid: userUid });
      document.getElementById('loading').classList.add('d-none');
      
      if (res.status === "found") {
        userData = res.data;
        populateForm(res.data);
        document.getElementById('step1').classList.add('d-none'); // ยุบ Step 1 อัตโนมัติ
        checkStep2(res.data.Single_Room_Rights || 'N');
      } else {
        promptIDCard();
      }
    }

    function promptIDCard() {
      Swal.fire({
        title: 'ยืนยันตัวตน',
        text: 'กรุณากรอกเลขบัตรประชาชน (Format: X-XXXX-XXXXX-XX-X)',
        input: 'text',
        allowOutsideClick: false,
        inputValidator: (value) => {
          if (!/^[0-9]-[0-9]{4}-[0-9]{5}-[0-9]{2}-[0-9]$/.test(value)) {
            return 'รูปแบบไม่ถูกต้อง กรุณาใส่เครื่องหมาย - ให้ครบ';
          }
        }
      }).then(async (result) => {
        if (result.isConfirmed) {
          Swal.showLoading();
          const res = await apiCall({ action: "verifyID", uid: userUid, idCard: result.value });
          if (res.status === "success") {
            userData = res.data;
            document.getElementById('displayInfo').value = `${userData.Title}${userData.FirstName} ${userData.LastName} (${userData.Position})`;
            document.getElementById('step1').classList.remove('d-none');
            Swal.close();
          } else {
            Swal.fire('ไม่พบข้อมูล', res.message, 'error').then(() => promptIDCard());
          }
        }
      });
    }

    document.getElementById('regForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // แจ้งเตือนถ้ายกเลิกการเข้าร่วม
      if(document.getElementById('joinStatus').value !== 'เข้าร่วม') {
        const confirm = await Swal.fire({title: 'ยืนยัน?', text: 'คู่ที่จับแล้วหรือคำขอที่รอดำเนินการอยู่ จะถูกยกเลิก', icon: 'warning', showCancelButton: true});
        if(!confirm.isConfirmed) return;
      }

      const payload = {
        idCard: userData.ID_Card || userData.idCard, title: userData.Title, firstName: userData.FirstName, lastName: userData.LastName,
        position: userData.Position, department: userData.Department,
        joinStatus: document.getElementById('joinStatus').value, travel: document.getElementById('travel').value,
        allergy: document.getElementById('allergy').value === 'แพ้' ? document.getElementById('allergyNote').value : 'ไม่แพ้',
        food: document.getElementById('food').value === 'อื่นๆ' ? document.getElementById('foodNote').value : document.getElementById('food').value,
        phone: document.getElementById('phone').value, note: document.getElementById('note').value
      };

      Swal.showLoading();
      const res = await apiCall({ action: "register", uid: userUid, data: payload });
      if (res.status === "success") {
        Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อย', 'success');
        document.getElementById('step1').classList.add('d-none');
        userData.Join_Status = payload.joinStatus;
        checkStep2(res.singleRights);
      } else {
        Swal.fire('ข้อผิดพลาด', res.message, 'error');
      }
    });

    function checkStep2(singleRights) {
      if (singleRights === 'Y' || userData.Join_Status !== 'เข้าร่วม') {
        document.getElementById('step2').classList.add('d-none');
        clearInterval(pollInterval);
        return;
      }
      document.getElementById('step2').classList.remove('d-none');
      loadMatchState();
      pollInterval = setInterval(loadMatchState, 5000); // Realtime Polling ทุก 5 วินาที
    }

    async function loadMatchState() {
      const res = await apiCall({ action: "getMatchStatus", uid: userUid });
      let html = "";
      if (res.matched) {
        html = `<div class="alert alert-success">คุณจับคู่กับ: <b>${res.matched}</b> เรียบร้อยแล้ว</div>`;
      } else {
        if (res.incoming.length > 0) {
          html += `<div class="alert alert-warning">คำขอถึงคุณ: <br>`;
          res.incoming.forEach(r => {
            html += `- ${r.user} <button class="btn btn-sm btn-success mx-1" onclick="respondMatch('${r.reqId}','Accepted')">รับ</button><button class="btn btn-sm btn-danger" onclick="respondMatch('${r.reqId}','Rejected')">ปฏิเสธ</button><br>`;
          });
          html += `</div>`;
        }
        if (res.outgoing.length > 0) {
          html += `<div class="alert alert-info">คำขอที่คุณส่งไป (รอดำเนินการ): <br>`;
          res.outgoing.forEach(r => html += `- ${r.user}<br>`);
          html += `</div>`;
        }
        if(res.incoming.length === 0 && res.outgoing.length === 0) {
          html = `<div class="alert alert-secondary">ยังไม่มีการจับคู่</div>`;
        }
      }
      document.getElementById('matchState').innerHTML = html;
    }

    async function searchUser() {
      const kw = document.getElementById('searchName').value;
      if (!kw) return;
      const res = await apiCall({ action: "searchMatch", uid: userUid, keyword: kw });
      const container = document.getElementById('searchResults');
      container.innerHTML = "";
      if (res.status === "success") {
        res.results.forEach(u => {
          container.innerHTML += `<div class="list-group-item d-flex justify-content-between align-items-center">
            ${u.name} (${u.position}) <button class="btn btn-sm btn-primary" onclick="sendMatch('${u.uid}')">ขอจับคู่</button>
          </div>`;
        });
      } else {
        Swal.fire('ไม่พบข้อมูล', res.message, 'info');
      }
    }

    async function sendMatch(targetUid) {
      await apiCall({ action: "sendRequest", uid: userUid, targetUid: targetUid });
      Swal.fire('สำเร็จ', 'ส่งคำขอเรียบร้อย', 'success');
      loadMatchState();
    }

    async function respondMatch(reqId, response) {
      await apiCall({ action: "respondRequest", uid: userUid, reqId: reqId, response: response });
      loadMatchState();
    }

    function toggleInput(selectId, inputId, triggerVal = 'แพ้') {
      const select = document.getElementById(selectId);
      const input = document.getElementById(inputId);
      select.value === triggerVal ? input.classList.remove('d-none') : input.classList.add('d-none');
    }
    
    function toggleStep1() {
      document.getElementById('step1').classList.toggle('d-none');
    }

    function populateForm(data) {
      document.getElementById('displayInfo').value = `${data.Title}${data.FirstName} ${data.LastName}`;
      document.getElementById('joinStatus').value = data.Join_Status;
      document.getElementById('travel').value = data.Travel;
      document.getElementById('phone').value = data.Phone.replace(/'/g, '');
      // จัดการค่าที่ซ่อนใน dropdown
      if(['ไม่แพ้', ''].includes(data.Allergy)) document.getElementById('allergy').value = data.Allergy;
      else { document.getElementById('allergy').value = 'แพ้'; toggleInput('allergy','allergyNote'); document.getElementById('allergyNote').value = data.Allergy; }
    }

    async function apiCall(payload) {
      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
      return await res.json();
    }

    window.onload = init;
  </script>
</body>
</html>
