<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนสัมมนา & จับคู่นอน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0fdf4; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); padding: 2rem; }
        .input-style { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; margin-top: 0.5rem; }
        .btn-primary { background-color: #10b981; color: white; padding: 0.75rem; border-radius: 0.5rem; width: 100%; font-weight: 600; margin-top: 1rem; }
        .btn-primary:hover { background-color: #059669; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="card w-full max-w-md" id="app">
        <div class="text-center mb-6">
            <img src="./Logodwr.png" alt="Logo" class="mx-auto h-24 object-contain">
            <h2 class="text-xl font-bold mt-4 text-gray-800">ลงทะเบียนสัมมนา</h2>
        </div>

        <div id="section-verify">
            <label class="block text-gray-700 font-semibold">หมายเลขบัตรประชาชน</label>
            <input type="text" id="idCard" class="input-style" placeholder="x-xxxx-xxxxx-xx-x" maxlength="17" oninput="formatIDCard(this)">
            
            <label class="block text-gray-700 font-semibold mt-4">วันเดือนปีเกิด (พ.ศ.)</label>
            <input type="date" id="dob" class="input-style" onkeydown="return false;">
            <p class="text-xs text-red-500 mt-1">* กรุณาเลือกจากปฏิทินเท่านั้น</p>

            <button onclick="verifyData()" class="btn-primary">ตรวจสอบข้อมูล</button>
        </div>

        <div id="section-form" class="hidden">
            <h3 class="font-bold text-lg text-blue-600 mb-2">ข้อมูลส่วนตัว</h3>
            <p id="displayUserInfo" class="text-sm bg-blue-50 p-3 rounded mb-4"></p>

            <label class="block text-gray-700 font-semibold">1. ความประสงค์เข้าร่วมกิจกรรม</label>
            <select id="joinIntent" class="input-style">
                <option value="Y">เข้าร่วม</option>
                <option value="N">ไม่เข้าร่วม</option>
            </select>

            <button onclick="submitForm()" class="btn-primary mt-6">บันทึกข้อมูล</button>
        </div>

        <div id="loading" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center rounded-xl">
            <div class="text-white font-bold text-xl">กำลังประมวลผล...</div>
        </div>
    </div>

    <script>
        // --- ตัวแปรสำคัญ ---
        const LIFF_ID = "2010492833-vdob7H57"; // ใส่ LIFF ID ของคุณ
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz4SW3PjipqUdAMCj-IbqJhxTzUPyKq-Qa_5dkserHvu28bIFdFmHmeD5ReDtkjDaqc/exec"; // ใส่ URL Web App ที่ได้จาก Apps Script
        let userProfile = null;
        let verifiedData = null;

        // 1. Initialize LIFF
        async function main() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                userProfile = await liff.getProfile();
                checkRegistration(userProfile.userId);
            }
        }
        main();

        // 2. เช็คว่าเคยลงทะเบียนไหม
        function checkRegistration(uid) {
            Swal.fire({ title: 'กำลังตรวจสอบสถานะ...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }});
            
            fetch(`${GAS_URL}?action=checkUID&uid=${uid}`, { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                Swal.close();
                if(data.status === 'registered') {
                    // ถ้าระบบเปิดให้แก้ไขข้อมูล ค่อยจัดการ UI ส่วนแก้ไข
                    Swal.fire('พบข้อมูล', 'ท่านได้ลงทะเบียนแล้ว (ฟังก์ชันแก้ไขกำลังอยู่ในช่วงพัฒนา)', 'info');
                } else {
                    Swal.fire('ยังไม่พบข้อมูล', 'กรุณากรอกข้อมูลบัตรประชาชนและวันเกิดเพื่อตรวจสอบสิทธิ์', 'warning');
                }
            });
        }

        // 3. Format บัตรประชาชน (0-0000-00000-00-0)
        function formatIDCard(input) {
            let val = input.value.replace(/\D/g, '');
            let formatted = '';
            if (val.length > 0) formatted += val.substring(0, 1) + (val.length > 1 ? '-' : '');
            if (val.length > 1) formatted += val.substring(1, 5) + (val.length > 5 ? '-' : '');
            if (val.length > 5) formatted += val.substring(5, 10) + (val.length > 10 ? '-' : '');
            if (val.length > 10) formatted += val.substring(10, 12) + (val.length > 12 ? '-' : '');
            if (val.length > 12) formatted += val.substring(12, 13);
            input.value = formatted;

            // Auto focus ไปช่องถัดไปเมื่อครบ 13 หลัก (17 ตัวอักษรรวมขีด)
            if(input.value.length === 17) document.getElementById('dob').focus();
        }

        // 4. ค้นหาข้อมูลจาก Sheet1
        function verifyData() {
            const idCard = document.getElementById('idCard').value.replace(/-/g, '');
            const dob = document.getElementById('dob').value; // จำเป็นต้องแปลง พ.ศ. ตาม format ของตาราง

            if(idCard.length !== 13 || !dob) {
                return Swal.fire('ผิดพลาด', 'กรุณากรอกข้อมูลให้ครบถ้วน', 'error');
            }

            Swal.fire({ title: 'กำลังค้นหาฐานข้อมูล...', didOpen: () => { Swal.showLoading() }});
            
            fetch(`${GAS_URL}?action=verifyUser&idCard=${idCard}&dob=${dob}`, { method: 'POST' })
            .then(res => res.json())
            .then(res => {
                if(res.status === 'success') {
                    verifiedData = res.data;
                    Swal.fire('สำเร็จ', `ยินดีต้อนรับคุณ ${verifiedData.fname} ${verifiedData.lname}`, 'success');
                    
                    // แสดงข้อมูล และเปิดฟอร์ม
                    document.getElementById('displayUserInfo').innerText = `ชื่อ: ${verifiedData.title}${verifiedData.fname} ${verifiedData.lname}\nตำแหน่ง: ${verifiedData.position}\nสังกัด: ${verifiedData.dept}`;
                    document.getElementById('section-verify').classList.add('hidden');
                    document.getElementById('section-form').classList.remove('hidden');
                } else {
                    Swal.fire('ไม่พบข้อมูล', 'ข้อมูลบัตรประชาชนหรือวันเกิดไม่ตรงกับฐานข้อมูล', 'error');
                }
            });
        }

        // 5. บันทึกข้อมูล
        function submitForm() {
            const payload = {
                uid: userProfile.userId,
                idCard: verifiedData.idCard,
                dob: verifiedData.dob,
                title: verifiedData.title,
                fname: verifiedData.fname,
                lname: verifiedData.lname,
                position: verifiedData.position,
                dept: verifiedData.dept,
                singleRoom: verifiedData.singleRoom,
                join: document.getElementById('joinIntent').value,
                // ดึงค่าอื่นๆ จากฟอร์มมาใส่...
            };

            Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => { Swal.showLoading() }});
            fetch(`${GAS_URL}?action=register&data=${encodeURIComponent(JSON.stringify(payload))}`, { method: 'POST' })
            .then(res => res.json())
            .then(res => {
                if(res.status === 'success') {
                    Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อยแล้ว', 'success').then(() => {
                        // เช็คสิทธิ์การนอนเดียว แล้วนำไปสู่หน้าจับคู่...
                        if(verifiedData.singleRoom === 'N') {
                            Swal.fire('ขั้นตอนต่อไป', 'กรุณาเลือกเพื่อนร่วมห้อง', 'info');
                            // ทำการ Redirect หรือโชว์หน้า UI ค้นหารายชื่อจับคู่
                        } else {
                            liff.closeWindow();
                        }
                    });
                }
            });
        }
    </script>
</body>
</html>
