<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนเข้าร่วมสัมมนา | กรมทรัพยากรน้ำ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <style>
        body { font-family: 'Sarabun', sans-serif; background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); min-height: 100vh; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn-water { background: linear-gradient(to right, #0284c7, #0ea5e9); color: white; transition: all 0.3s; }
        .btn-water:hover { background: linear-gradient(to right, #0369a1, #0284c7); transform: translateY(-2px); }
    </style>
</head>
<body class="p-4 flex items-center justify-center">

    <div class="glass-panel w-full max-w-md p-6 relative overflow-hidden">
        <div class="text-center mb-6">
            <img src="https://dwr.go.th/uploads/userfiles/images/Logodwr.png" alt="DWR Logo" class="h-20 mx-auto mb-3 drop-shadow-md">
            <h1 class="text-xl font-semibold text-sky-800">ระบบลงทะเบียนสัมมนา</h1>
            <p class="text-sm text-sky-600">กรมทรัพยากรน้ำ (DWR)</p>
        </div>

        <div id="loading" class="text-center py-10 text-sky-600">
            <svg class="animate-spin h-8 w-8 mx-auto mb-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p>กำลังตรวจสอบข้อมูล...</p>
        </div>

        <div id="idCardSection" class="hidden">
            <label class="block text-sm font-medium text-gray-700 mb-1">กรุณากรอกหมายเลขบัตรประชาชน</label>
            <input type="text" id="idCardInput" placeholder="0-0000-00000-00-0" class="w-full p-3 border border-sky-200 rounded-lg focus:ring-2 focus:ring-sky-400 focus:outline-none text-center text-lg tracking-widest mb-4">
            <button onclick="verifyIdCard()" class="btn-water w-full py-3 rounded-lg font-semibold shadow-md">ตรวจสอบข้อมูล</button>
        </div>

        <div id="step1Section" class="hidden space-y-4">
            <div id="userInfoDisplay" class="bg-sky-50 p-3 rounded-lg border border-sky-100 text-sm text-sky-900 mb-4">
                </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">1. การเข้าร่วมกิจกรรม *</label>
                <select id="joinStatus" class="w-full p-2 border rounded-lg" required>
                    <option value="">-- เลือก --</option>
                    <option value="Y">เข้าร่วม</option>
                    <option value="N">ไม่เข้าร่วม</option>
                </select>
            </div>
            
            <button onclick="submitStep1()" class="btn-water w-full py-3 rounded-lg font-semibold shadow-md mt-4">บันทึกข้อมูล Step 1</button>
        </div>

        <div id="step2Section" class="hidden">
            <h2 class="text-lg font-semibold text-sky-800 border-b pb-2 mb-4">Step 2: จัดการห้องพัก</h2>
            <div class="relative">
                <input type="text" placeholder="ค้นหาชื่อ-สกุล เพื่อจับคู่..." class="w-full p-2 border rounded-lg">
                <p class="text-xs text-gray-400 mt-2">* หากไม่พบรายชื่อ อาจเป็นไปได้ว่าบุคคลนั้นยังไม่ลงทะเบียน หรือถูกจับคู่ไปแล้ว</p>
            </div>
            </div>

    </div>

    <script>
        const LIFF_ID = "2010492833-vdob7H57";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz4SW3PjipqUdAMCj-IbqJhxTzUPyKq-Qa_5dkserHvu28bIFdFmHmeD5ReDtkjDaqc/exec"; // URL ของคุณ
        let userLineUid = "";

        // 1. Initialize LIFF
        async function initializeApp() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                const profile = await liff.getProfile();
                userLineUid = profile.userId;
                checkUserInSystem();
            } catch (err) {
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อ LINE ได้', 'error');
            }
        }

        // 2. Check User Status from Backend
        async function checkUserInSystem(idCard = null) {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('idCardSection').classList.add('hidden');

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'checkUser', lineUid: userLineUid, idCard: idCard })
                });
                const result = await response.json();
                
                document.getElementById('loading').classList.add('hidden');

                if (result.status === 'require_id') {
                    document.getElementById('idCardSection').classList.remove('hidden');
                } else if (result.status === 'found_db') {
                    // เจอใน Database แสดง Step 1
                    renderStep1(result.data);
                } else if (result.status === 'found_register') {
                    // ลงทะเบียนแล้ว พาไปหน้าแก้ หรือ Step 2
                    Swal.fire('พบข้อมูล', 'คุณได้ลงทะเบียนไว้แล้ว', 'success');
                    // Logic เปิด Step 1/2...
                } else {
                    Swal.fire('แจ้งเตือน', result.message, 'warning');
                    document.getElementById('idCardSection').classList.remove('hidden');
                }
            } catch (error) {
                Swal.fire('ข้อผิดพลาด', 'ติดต่อเซิร์ฟเวอร์ไม่ได้', 'error');
            }
        }

        // 3. UI Interactions
        function verifyIdCard() {
            const id = document.getElementById('idCardInput').value;
            // Basic Regex check for 0-0000-00000-00-0
            const idPattern = /^\d-\d{4}-\d{5}-\d{2}-\d$/;
            if(!idPattern.test(id)) {
                Swal.fire('รูปแบบไม่ถูกต้อง', 'กรุณากรอกให้อยู่ในรูปแบบ 0-0000-00000-00-0', 'warning');
                return;
            }
            checkUserInSystem(id);
        }

        function renderStep1(userData) {
            document.getElementById('step1Section').classList.remove('hidden');
            document.getElementById('userInfoDisplay').innerHTML = `
                <b>${userData.prefix}${userData.fname} ${userData.lname}</b><br>
                ตำแหน่ง: ${userData.position}<br>
                สังกัด: ${userData.dept}
            `;
            // เก็บค่า userData.single ไว้เช็คสำหรับ Step 2
        }

        function submitStep1() {
            // Logic ดึงข้อมูลจากฟอร์ม และ fetch ส่ง POST กลับไปที่ action: 'registerStep1'
            // จากนั้นซ่อน Step 1 และเปิด Step 2
            document.getElementById('step1Section').classList.add('hidden');
            document.getElementById('step2Section').classList.remove('hidden');
            Swal.fire('สำเร็จ', 'บันทึกข้อมูล Step 1 เรียบร้อย', 'success');
        }

        // เริ่มการทำงาน
        initializeApp();
    </script>
</body>
</html>
