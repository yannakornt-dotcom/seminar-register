<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนสัมมนา - กรมทรัพยากรน้ำ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        :root {
            --primary: #0088cc;
            --secondary: #005580;
            --bg: #f0f8ff;
        }
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            width: 100%; max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: none; /* ซ่อนไว้รอโหลดเสร็จ */
        }
        .logo { width: 120px; display: block; margin: 0 auto 20px; }
        h2 { text-align: center; color: var(--secondary); font-size: 22px; }
        label { font-weight: 600; margin-top: 15px; display: block; color: #333; }
        input, select, textarea {
            width: 100%; padding: 10px; margin-top: 5px;
            border: 1px solid #ccc; border-radius: 8px; font-family: 'Sarabun';
            box-sizing: border-box;
        }
        button {
            width: 100%; padding: 12px; margin-top: 20px;
            background: var(--primary); color: white; border: none;
            border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.3s; font-family: 'Sarabun';
        }
        button:hover { background: var(--secondary); }
        .hidden { display: none; }
        .roommate-card { border: 1px solid #ddd; padding: 10px; border-radius: 8px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center;}
        .btn-small { width: auto; padding: 5px 15px; margin: 0; font-size: 14px;}
    </style>
</head>
<body>

    <img src="Logodwr.png" alt="Logo" class="logo" id="logo" style="display:none;">

    <div class="container" id="step1">
        <h2>ตรวจสอบสิทธิ์ลงทะเบียน</h2>
        <label>กรอกเลขประจำตัวประชาชน (13 หลัก)</label>
        <input type="text" id="idCard" placeholder="0-0000-00000-00-0" maxlength="17" oninput="formatIDCard(this)">
        <button onclick="verifyID()">ตรวจสอบข้อมูล</button>
    </div>

    <div class="container" id="step2">
        <h2>แบบฟอร์มลงทะเบียน</h2>
        <div id="userDataShow" style="background:#eef; padding:10px; border-radius:8px; margin-bottom:15px; font-size:14px;"></div>
        
        <label>ประสงค์เข้าร่วมกิจกรรม</label>
        <select id="isJoin">
            <option value="Y">เข้าร่วม</option>
            <option value="N">ไม่เข้าร่วม</option>
        </select>

        <div id="joinDetails">
            <label>การเดินทาง (ขาไป)</label>
            <select id="travelIn"><option value="ส่วนตัว">รถยนต์ส่วนบุคคล</option><option value="ส่วนรวม">ไปกับกรม</option></select>
            
            <label>การเดินทาง (ขากลับ)</label>
            <select id="travelOut"><option value="ส่วนตัว">รถยนต์ส่วนบุคคล</option><option value="ส่วนรวม">กลับกับกรม</option></select>

            <label>ประวัติแพ้อาหาร</label>
            <input type="text" id="allergy" placeholder="เช่น กุ้ง, ถั่ว (ถ้าไม่มีให้ขีด -)">

            <label>ประเภทอาหารที่ทาน</label>
            <select id="foodType">
                <option value="ทั่วไป">ทั่วไป</option>
                <option value="อิสลาม">ฮาลาล (อิสลาม)</option>
                <option value="มังสวิรัติ">มังสวิรัติ</option>
                <option value="อื่นๆ">อื่นๆ (โปรดระบุในช่องเพิ่มเติม)</option>
            </select>

            <label>เบอร์โทรศัพท์มือถือ</label>
            <input type="tel" id="phone" placeholder="08XXXXXXXX" maxlength="10">

            <label>ข้อมูลเพิ่มเติม</label>
            <textarea id="note" rows="2" placeholder="ระบุข้อมูลเพิ่มเติม"></textarea>
        </div>

        <button onclick="submitRegistration()">บันทึกข้อมูล</button>
    </div>

    <div class="container" id="step3">
        <h2>ระบบจับคู่นอน</h2>
        <div id="roomStatus"></div>
        <div id="requestArea"></div>
        <div id="searchArea">
            <label>ค้นหารายชื่อผู้ที่เข้าร่วม</label>
            <input type="text" id="searchName" placeholder="พิมพ์ชื่อเพื่อค้นหา..." oninput="filterRoommates()">
            <div id="roommateList"></div>
        </div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz4SW3PjipqUdAMCj-IbqJhxTzUPyKq-Qa_5dkserHvu28bIFdFmHmeD5ReDtkjDaqc/exec"; // *** เปลี่ยนตรงนี้ ***
    const LIFF_ID = "2010492833-vdob7H57"; // *** เปลี่ยนตรงนี้ ***
    
    let userProfile = {};
    let masterData = {};
    let roommateDataStore = [];

    // Format เลขบัตรประชาชน
    function formatIDCard(input) {
        let val = input.value.replace(/\D/g, '');
        if (val.length > 13) val = val.substring(0, 13);
        let formatted = '';
        for (let i = 0; i < val.length; i++) {
            if (i === 1 || i === 5 || i === 10 || i === 12) formatted += '-';
            formatted += val[i];
        }
        input.value = formatted;
    }

    async function initLIFF() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                userProfile = await liff.getProfile();
                document.getElementById('logo').style.display = 'block';
                checkExistingUser();
            }
        } catch (err) {
            Swal.fire("ข้อผิดพลาด", "ไม่สามารถเชื่อมต่อ LINE ได้", "error");
        }
    }

    async function checkExistingUser() {
        Swal.fire({ title: 'กำลังตรวจสอบข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
        let res = await fetchGAS({ action: 'checkUser', uid: userProfile.userId });
        
        if (res.status === 'found') {
            // เคยลงทะเบียนแล้ว -> พาไปหน้าจับคู่ หรือ ฟอร์มแก้ไข
            masterData = { 
                fullname: res.data[3], idCard: res.data[2], singleRoom: res.data[11], isJoin: res.data[4]
            };
            document.getElementById('isJoin').value = res.data[4];
            document.getElementById('travelIn').value = res.data[5];
            document.getElementById('travelOut').value = res.data[6];
            document.getElementById('allergy').value = res.data[7];
            document.getElementById('foodType').value = res.data[8];
            document.getElementById('phone').value = res.data[9];
            document.getElementById('note').value = res.data[10];

            Swal.fire({
                title: 'พบประวัติการลงทะเบียน',
                text: 'คุณต้องการแก้ไขข้อมูล หรือ จัดการจับคู่นอน?',
                icon: 'info',
                showCancelButton: true,
                confirmButtonText: 'จัดการจับคู่นอน',
                cancelButtonText: 'แก้ไขข้อมูล'
            }).then((result) => {
                if (result.isConfirmed) { loadRoommateSystem(); }
                else { showStep(2); }
            });
        } else {
            Swal.close();
            showStep(1);
        }
    }

    async function verifyID() {
        let idCard = document.getElementById('idCard').value;
        if(idCard.length < 17) return Swal.fire("แจ้งเตือน", "กรุณากรอกเลขบัตรให้ครบ 13 หลัก", "warning");

        Swal.fire({ title: 'กำลังค้นหา...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
        let res = await fetchGAS({ action: 'verifyID', idCard: idCard });
        
        if (res.status === 'success') {
            masterData = res.data;
            masterData.fullname = `${masterData.title}${masterData.fname} ${masterData.lname}`;
            document.getElementById('userDataShow').innerHTML = `<b>ชื่อ-สกุล:</b> ${masterData.fullname}<br><b>ตำแหน่ง:</b> ${masterData.position}<br><b>สังกัด:</b> ${masterData.dept}`;
            Swal.close();
            showStep(2);
        } else {
            Swal.fire("ไม่พบข้อมูล", "ไม่พบเลขบัตรประชาชนนี้ในระบบ", "error");
        }
    }

    async function submitRegistration() {
        let data = {
            action: 'register', uid: userProfile.userId,
            idCard: masterData.idCard, fullname: masterData.fullname, singleRoom: masterData.singleRoom,
            isJoin: document.getElementById('isJoin').value,
            travelIn: document.getElementById('travelIn').value,
            travelOut: document.getElementById('travelOut').value,
            allergy: document.getElementById('allergy').value,
            foodType: document.getElementById('foodType').value,
            phone: document.getElementById('phone').value,
            note: document.getElementById('note').value
        };

        if(data.isJoin === 'Y' && !data.phone) return Swal.fire("แจ้งเตือน", "กรุณากรอกเบอร์โทรศัพท์", "warning");

        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
        let res = await fetchGAS(data);
        
        if(res.status === 'success') {
            Swal.fire("สำเร็จ!", "บันทึกข้อมูลเรียบร้อย", "success").then(() => {
                masterData.isJoin = data.isJoin;
                loadRoommateSystem();
            });
        }
    }

    async function loadRoommateSystem() {
        if(masterData.isJoin === 'N') {
            Swal.fire("แจ้งเตือน", "คุณแจ้งไม่เข้าร่วมกิจกรรม ไม่จำเป็นต้องจับคู่นอน", "info");
            return;
        }
        if(masterData.singleRoom === 'Y') {
            Swal.fire("แจ้งเตือน", "คุณได้รับสิทธิ์นอนเดี่ยว ไม่จำเป็นต้องจับคู่นอน", "success");
            return;
        }

        showStep(3);
        Swal.fire({ title: 'กำลังโหลดข้อมูลที่พัก...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
        
        let res = await fetchGAS({ action: 'getRoommateData', uid: userProfile.userId });
        Swal.close();

        let me = res.me; // สถานะของฉัน
        let statusDiv = document.getElementById('roomStatus');
        let reqArea = document.getElementById('requestArea');
        let searchArea = document.getElementById('searchArea');

        reqArea.innerHTML = '';
        
        if(me[12] === "Matched") {
            statusDiv.innerHTML = `<h3 style="color:green;">✅ คุณมีคู่นอนแล้ว (จับคู่กับ UID: ${me[15]})</h3>`;
            searchArea.style.display = 'none';
        } else {
            statusDiv.innerHTML = `<h3 style="color:orange;">⏳ คุณยังไม่มีคู่นอน</h3>`;
            searchArea.style.display = 'block';
            
            // แสดงคนขอจับคู่เรามา
            if(res.requests.length > 0) {
                reqArea.innerHTML = `<b style="color:var(--primary);">มีผู้ขอจับคู่กับคุณ:</b>`;
                res.requests.forEach(req => {
                    reqArea.innerHTML += `
                    <div class="roommate-card">
                        <span>${req.name}</span>
                        <button class="btn-small" onclick="acceptRoom('${req.uid}')">ตอบรับ</button>
                    </div>`;
                });
            }

            roommateDataStore = res.available;
            filterRoommates(); // Render list
        }
    }

    function filterRoommates() {
        let q = document.getElementById('searchName').value.toLowerCase();
        let list = document.getElementById('roommateList');
        list.innerHTML = '';

        let filtered = roommateDataStore.filter(p => p.name.toLowerCase().includes(q));
        if(filtered.length === 0) {
            list.innerHTML = `<div style="font-size:12px; color:gray; text-align:center; margin-top:10px;">บุคคลที่ท่านกำลังค้นหาอาจยังไม่ลงทะเบียน ไม่เข้าร่วม หรือจับคู่นอนไปเรียบร้อยแล้ว</div>`;
        } else {
            filtered.forEach(p => {
                list.innerHTML += `
                <div class="roommate-card">
                    <span>${p.name}</span>
                    <button class="btn-small" onclick="requestRoom('${p.uid}', '${p.name}')">ขอจับคู่</button>
                </div>`;
            });
        }
    }

    async function requestRoom(targetUid, name) {
        Swal.fire({
            title: `ยืนยันขอจับคู่กับ ${name}?`,
            showCancelButton: true, confirmButtonText: 'ยืนยัน', cancelButtonText: 'ยกเลิก'
        }).then(async (result) => {
            if(result.isConfirmed){
                Swal.fire({ title: 'กำลังส่งคำขอ...', didOpen: () => { Swal.showLoading() } });
                await fetchGAS({ action: 'requestRoommate', uid: userProfile.userId, targetUid: targetUid });
                Swal.fire("สำเร็จ", "ส่งคำขอแล้ว รอการตอบรับ", "success");
                loadRoommateSystem(); // reload
            }
        });
    }

    async function acceptRoom(targetUid) {
        Swal.fire({ title: 'กำลังตอบรับ...', didOpen: () => { Swal.showLoading() } });
        await fetchGAS({ action: 'acceptRoommate', uid: userProfile.userId, targetUid: targetUid });
        Swal.fire("สำเร็จ", "จับคู่สำเร็จแล้ว!", "success");
        loadRoommateSystem(); // reload
    }

    function showStep(step) {
        document.getElementById('step1').style.display = step === 1 ? 'block' : 'none';
        document.getElementById('step2').style.display = step === 2 ? 'block' : 'none';
        document.getElementById('step3').style.display = step === 3 ? 'block' : 'none';
    }

    // Helper Function สำหรับเรียก GAS Web App แบบ POST text/plain
    async function fetchGAS(payload) {
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        return await response.json();
    }

    // เริ่มต้นระบบ
    window.onload = () => { initLIFF(); };

</script>
</body>
</html>
