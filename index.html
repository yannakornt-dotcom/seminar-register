<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนเข้าร่วมงานสัมมนาและจัดการห้องพัก</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #fce4ec; /* สีชมพูพาสเทลน่ารัก */
            color: #333;
        }
        .container-app {
            max-width: 500px;
            margin: 20px auto;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 30px 20px;
        }
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
        }
        .logo-container img {
            max-width: 100%;
            height: auto;
            object-fit: contain; /* ป้องกันการตัดทอนสัดส่วนโลโก้ */
            display: block;
            margin: 0 auto;
        }
        h4.title-text {
            text-align: center;
            color: #880e4f;
            font-weight: 600;
            margin-bottom: 20px;
            margin-top: 15px;
        }
        .btn-primary {
            background-color: #d81b60;
            border-color: #d81b60;
            border-radius: 10px;
        }
        .btn-primary:hover {
            background-color: #ad1457;
        }
        .form-label {
            font-weight: 500;
            color: #4a148c;
        }
        .conditional-input {
            display: none;
            margin-top: 10px;
        }
        /* Style เพิ่มเติมสำหรับส่วนจับคู่ */
        .match-box {
            background-color: #f3e5f5;
            border: 1px dashed #ab47bc;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container-app">
    <div class="logo-container">
        <img src="https://dwr.go.th/uploads/userfiles/images/Logodwr.png" alt="DWR Logo">
        <h4 class="title-text">ลงทะเบียนร่วมงานสัมมนา<br><small style="font-size: 16px;">และจัดการห้องพัก</small></h4>
    </div>

    <div id="loadingSection" class="text-center">
        <div class="spinner-border text-pink" style="color: #d81b60;" role="status"></div>
        <p class="mt-2 text-muted">กำลังตรวจสอบข้อมูลระบบ...</p>
    </div>

    <div id="checkIdSection" style="display: none;">
        <div class="mb-3">
            <label class="form-label">กรุณากรอกหมายเลขบัตรประชาชนเพื่อยืนยันตัวตน</label>
            <input type="text" class="form-control text-center form-control-lg" id="nationalIdInput" placeholder="0-0000-00000-00-0" maxlength="17">
        </div>
        <button class="btn btn-primary w-100 py-2" onclick="verifyID()">ตรวจสอบข้อมูล</button>
    </div>

    <div id="registerFormSection" style="display: none;">
        <div class="alert alert-info" id="userInfoDisplay"></div>
        
        <form id="regForm" onsubmit="submitForm(event)">
            <div class="mb-3">
                <label class="form-label">ประสงค์เข้าร่วมกิจกรรมหรือไม่?</label>
                <select class="form-select" id="attend" required>
                    <option value="" selected disabled>-- เลือก --</option>
                    <option value="Y">เข้าร่วม</option>
                    <option value="N">ไม่เข้าร่วม</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">การเดินทาง</label>
                <select class="form-select" id="travel" required>
                    <option value="" selected disabled>-- เลือก --</option>
                    <option value="Car">รถยนต์ส่วนบุคคล</option>
                    <option value="Bus">รถที่กรมจัดหาให้ (ไป-กลับ)</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">การแพ้อาหาร</label>
                <select class="form-select" id="allergy" onchange="toggleInput('allergy', 'allergyDetail', 'แพ้')" required>
                    <option value="" selected disabled>-- เลือก --</option>
                    <option value="ไม่แพ้">ไม่แพ้</option>
                    <option value="แพ้">แพ้</option>
                </select>
                <input type="text" class="form-control conditional-input" id="allergyDetail" placeholder="โปรดระบุสิ่งที่แพ้">
            </div>

            <div class="mb-3">
                <label class="form-label">ประเภทอาหาร</label>
                <select class="form-select" id="foodType" onchange="toggleInput('foodType', 'foodDetail', 'อื่นๆ')" required>
                    <option value="" selected disabled>-- เลือก --</option>
                    <option value="ทั่วไป">ทานได้ทุกอย่าง</option>
                    <option value="อิสลาม">อิสลาม</option>
                    <option value="มังสวิรัติ">มังสวิรัติ</option>
                    <option value="อื่นๆ">อื่นๆ</option>
                </select>
                <input type="text" class="form-control conditional-input" id="foodDetail" placeholder="โปรดระบุ">
            </div>

            <div class="mb-3">
                <label class="form-label">เบอร์โทรศัพท์มือถือ</label>
                <input type="tel" class="form-control" id="phone" required placeholder="08xxxxxxxx" maxlength="10">
            </div>

            <div class="mb-3">
                <label class="form-label">ข้อมูลเพิ่มเติม (ไม่บังคับ)</label>
                <textarea class="form-control" id="extraInfo" rows="2"></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">บันทึกข้อมูล</button>
        </form>
    </div>

    <div id="matchingSection" style="display: none;">
        <div class="alert alert-success text-center">คุณได้ลงทะเบียนเข้าร่วมงานเรียบร้อยแล้ว</div>
        <hr>
        <h5 class="text-center mb-3" style="color: #4a148c; font-weight: bold;">การจัดการห้องพัก 🛏️</h5>
        
        <div class="match-box text-center" id="currentMatchStatus">
            กำลังโหลดสถานะห้องพัก...
        </div>

        <div id="incomingRequestsBox" style="display: none;" class="mb-3">
            <h6 class="text-danger fw-bold">📥 มีคำขอจับคู่ถึงคุณ!</h6>
            <div id="incomingList"></div>
        </div>

        <div id="searchMatchBox" style="display: none;">
            <label class="form-label">ค้นหาเพื่อขอจับคู่นอน (พิมพ์ชื่อ หรือ นามสกุล)</label>
            <div class="input-group mb-2">
                <input type="text" id="searchKeyword" class="form-control" placeholder="ค้นหาชื่อ...">
                <button class="btn btn-outline-primary" type="button" onclick="searchRoommate()">ค้นหา</button>
            </div>
            <div id="searchResults" class="list-group"></div>
            <small class="text-muted mt-2 d-block" style="font-size: 12px;">* หากไม่พบรายชื่อ อาจเป็นไปได้ว่าบุคคลนั้นยังไม่ลงทะเบียน, ไม่เข้าร่วม, หรือมีคู่แล้ว</small>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // ตั้งค่าตัวแปรสำคัญ (ต้องแก้ไขตรงนี้)
    // ==========================================
    const LIFF_ID = "2010492833-vdob7H57"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz4SW3PjipqUdAMCj-IbqJhxTzUPyKq-Qa_5dkserHvu28bIFdFmHmeD5ReDtkjDaqc/exec";
    
    let userProfile = { uid: "" };
    let fetchedDatabaseInfo = {};
    let pollingInterval;

    // ==========================================
    // ส่วนของการลงทะเบียนและตรวจสอบสิทธิ์
    // ==========================================

    // 1. Initialize LIFF
    async function main() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                userProfile.uid = profile.userId;
                checkSystemRegistration();
            }
        } catch (err) {
            console.error("LIFF Init Error: ", err);
            Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อ LINE LIFF ได้', 'error');
        }
    }
    main();

    // 2. จัดรูปแบบเลขบัตร ปชช อัตโนมัติ (0-0000-00000-00-0)
    document.getElementById('nationalIdInput').addEventListener('input', function (e) {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,1})(\d{0,4})(\d{0,5})(\d{0,2})(\d{0,1})/);
        e.target.value = !x[2] ? x[1] : x[1] + '-' + x[2] + (x[3] ? '-' + x[3] : '') + (x[4] ? '-' + x[4] : '') + (x[5] ? '-' + x[5] : '');
    });

    // 3. ตรวจสอบว่าเคยลงทะเบียนหรือไม่
    function checkSystemRegistration() {
        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "checkUser", uid: userProfile.uid })
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('loadingSection').style.display = 'none';
            if (data.status === "registered") {
                // หากลงทะเบียนแล้ว นำไปสู่ระบบจัดห้องพัก
                initMatchingSystem(data.data);
            } else {
                // หากยังไม่ลงทะเบียน
                document.getElementById('checkIdSection').style.display = 'block';
            }
        }).catch(err => {
            Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
        });
    }

    // 4. ตรวจสอบเลขบัตร ปชช กับ Database
    function verifyID() {
        const idInput = document.getElementById('nationalIdInput').value;
        if (idInput.length !== 17) {
            Swal.fire('ผิดพลาด', 'กรุณากรอกเลขบัตรประชาชนให้ครบ 13 หลัก', 'error');
            return;
        }

        Swal.fire({ title: 'กำลังค้นหาข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "verifyId", nationalId: idInput, uid: userProfile.uid })
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === "found") {
                Swal.close();
                document.getElementById('checkIdSection').style.display = 'none';
                document.getElementById('registerFormSection').style.display = 'block';
                
                fetchedDatabaseInfo = data.data;
                document.getElementById('userInfoDisplay').innerHTML = `
                    <strong>ชื่อ:</strong> ${data.data.Prefix}${data.data.Firstname} ${data.data.Lastname}<br>
                    <strong>ตำแหน่ง:</strong> ${data.data.Position}<br>
                    <strong>สังกัด:</strong> ${data.data.Department}
                `;
            } else {
                Swal.fire('ไม่พบข้อมูล', data.message, 'error');
            }
        });
    }

    // 5. จัดการแสดงกล่องกรอกข้อความเมื่อเลือก "อื่นๆ" หรือ "แพ้"
    function toggleInput(selectId, inputId, triggerValue) {
        const selectBox = document.getElementById(selectId);
        const inputBpx = document.getElementById(inputId);
        if (selectBox.value === triggerValue) {
            inputBpx.style.display = 'block';
            inputBpx.setAttribute('required', 'true');
        } else {
            inputBpx.style.display = 'none';
            inputBpx.removeAttribute('required');
            inputBpx.value = "";
        }
    }

    // 6. ส่งข้อมูลลงทะเบียน
    function submitForm(e) {
        e.preventDefault();
        
        const payload = {
            action: "registerUser",
            userData: {
                ...fetchedDatabaseInfo,
                Line_UID: userProfile.uid,
                Attend: document.getElementById('attend').value,
                Travel: document.getElementById('travel').value,
                Allergy: document.getElementById('allergy').value,
                Allergy_Detail: document.getElementById('allergyDetail').value,
                Food_Type: document.getElementById('foodType').value,
                Food_Detail: document.getElementById('foodDetail').value,
                Phone: document.getElementById('phone').value,
                Extra_Info: document.getElementById('extraInfo').value
            }
        };

        Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === "success") {
                Swal.fire({
                    icon: 'success',
                    title: 'ลงทะเบียนสำเร็จ!',
                    text: 'ระบบกำลังพาท่านไปยังขั้นตอนถัดไป',
                    confirmButtonColor: '#d81b60'
                }).then(() => {
                    // โหลดหน้าใหม่เพื่อเข้าสู่ระบบห้องพัก
                    location.reload();
                });
            }
        });
    }

    // ==========================================
    // ส่วนของระบบจัดการห้องพัก (Roommate Matching)
    // ==========================================

    function initMatchingSystem(userData) {
        document.getElementById('registerFormSection').style.display = 'none';
        document.getElementById('checkIdSection').style.display = 'none';
        document.getElementById('loadingSection').style.display = 'none';
        
        if (userData.Attend === 'Y') {
            document.getElementById('matchingSection').style.display = 'block';
            fetchMatchStatus(); // ดึงสถานะครั้งแรก
            // เริ่ม Polling ดึงข้อมูลใหม่ทุกๆ 15 วินาที เพื่อความ Real-time
            pollingInterval = setInterval(fetchMatchStatus, 15000);
        } else {
            // กรณีลงทะเบียนแล้วแต่แจ้งว่า "ไม่เข้าร่วม"
            document.getElementById('matchingSection').style.display = 'block';
            document.getElementById('currentMatchStatus').innerHTML = '<span class="text-danger">คุณระบุว่า <strong>"ไม่เข้าร่วมกิจกรรม"</strong> จึงไม่มีการจัดสรรห้องพัก</span>';
        }
    }

    function fetchMatchStatus() {
        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "getMatchData", uid: userProfile.uid })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "success") {
                renderMatchUI(data);
            }
        });
    }

    function renderMatchUI(data) {
        const statusBox = document.getElementById('currentMatchStatus');
        const incomingBox = document.getElementById('incomingRequestsBox');
        const searchBox = document.getElementById('searchMatchBox');
        const incomingList = document.getElementById('incomingList');

        // เช็คสิทธิ์นอนเดี่ยว
        if (data.singleRoom === "Y") {
            statusBox.innerHTML = "<h5 class='mb-2'>🌟 คุณมีสิทธิ์นอนเดี่ยว</h5>ระบบได้จัดสรรห้องพักเดี่ยวให้คุณเรียบร้อยแล้ว";
            searchBox.style.display = 'none';
            return;
        }

        // เช็คว่ามีคู่แล้วหรือไม่
        if (data.currentMatch) {
            statusBox.innerHTML = `<h5 class='mb-2'>🤝 จับคู่เรียบร้อย!</h5>รูมเมทของคุณคือ: <br><strong class="text-primary fs-5">${data.currentMatch.Other_Name}</strong>`;
            searchBox.style.display = 'none';
            incomingBox.style.display = 'none';
            return;
        }

        // กรณีเป็น Waiting หรือส่งคำขอไปแล้วแต่รอตอบรับ
        searchBox.style.display = 'block';
        statusBox.innerHTML = "สถานะ: <strong>รอการจับคู่</strong>";

        if (data.outgoingRequests.length > 0) {
            statusBox.innerHTML += `<br><div class="mt-2 text-muted" style="font-size: 14px;"><div class="spinner-grow spinner-grow-sm text-warning" role="status"></div> กำลังรอการตอบรับจาก:<br><strong>${data.outgoingRequests[0].Other_Name}</strong></div>`;
        }

        // กรณีมีคนส่งคำขอมาหาเรา
        if (data.incomingRequests.length > 0) {
            incomingBox.style.display = 'block';
            let reqHtml = '';
            data.incomingRequests.forEach(req => {
                reqHtml += `
                <div class="card mb-2 border-danger shadow-sm">
                    <div class="card-body p-3 d-flex justify-content-between align-items-center">
                        <span class="fw-bold text-dark">${req.Other_Name}</span>
                        <div>
                            <button class="btn btn-sm btn-success me-1" onclick="respondRequest('${req.Match_ID}', 'Matched')">ยอมรับ</button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="respondRequest('${req.Match_ID}', 'Rejected')">ปฏิเสธ</button>
                        </div>
                    </div>
                </div>`;
            });
            incomingList.innerHTML = reqHtml;
        } else {
            incomingBox.style.display = 'none';
        }
    }

    function searchRoommate() {
        const keyword = document.getElementById('searchKeyword').value.trim();
        if (!keyword) {
            Swal.fire('แจ้งเตือน', 'กรุณาพิมพ์ชื่อหรือนามสกุลที่ต้องการค้นหา', 'warning');
            return;
        }

        const btn = document.querySelector('#searchMatchBox button');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
        btn.disabled = true;

        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "searchRoommate", uid: userProfile.uid, keyword: keyword })
        })
        .then(res => res.json())
        .then(data => {
            btn.innerHTML = 'ค้นหา';
            btn.disabled = false;
            
            const resultBox = document.getElementById('searchResults');
            if (data.results.length === 0) {
                resultBox.innerHTML = `<div class="list-group-item text-danger text-center">ไม่พบรายชื่อ หรือบุคคลนี้ไม่สามารถจับคู่ได้</div>`;
                return;
            }
            
            let html = '';
            data.results.forEach(user => {
                html += `
                <div class="list-group-item d-flex justify-content-between align-items-center">
                    <div style="line-height: 1.2;">
                        <strong>${user.name}</strong><br>
                        <small class="text-muted" style="font-size: 12px;">${user.department}</small>
                    </div>
                    <button class="btn btn-sm btn-primary" onclick="requestRoommate('${user.uid}', '${user.name}')">ขอจับคู่</button>
                </div>`;
            });
            resultBox.innerHTML = html;
        });
    }

    function requestRoommate(targetUid, targetName) {
        Swal.fire({
            title: 'ยืนยันการส่งคำขอ?',
            text: `ระบบจะส่งคำขอจับคู่ไปยัง ${targetName}`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#d81b60',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'ยืนยันส่งคำขอ',
            cancelButtonText: 'ยกเลิก'
        }).then((result) => {
            if (result.isConfirmed) {
                Swal.fire({ title: 'กำลังส่งคำขอ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "requestRoommate", uid: userProfile.uid, targetUid: targetUid })
                })
                .then(res => res.json())
                .then(data => {
                    Swal.fire('สำเร็จ', 'ส่งคำขอเรียบร้อย รอการตอบรับจากอีกฝ่าย', 'success');
                    document.getElementById('searchKeyword').value = '';
                    document.getElementById('searchResults').innerHTML = '';
                    fetchMatchStatus(); // อัปเดต UI ทันที
                });
            }
        });
    }

    function respondRequest(matchId, responseStatus) {
        const actionText = responseStatus === 'Matched' ? 'ยอมรับ' : 'ปฏิเสธ';
        Swal.fire({
            title: `ยืนยันการ${actionText}?`,
            icon: responseStatus === 'Matched' ? 'success' : 'warning',
            showCancelButton: true,
            confirmButtonColor: responseStatus === 'Matched' ? '#198754' : '#d33',
            confirmButtonText: 'ยืนยัน',
            cancelButtonText: 'ยกเลิก'
        }).then((result) => {
            if (result.isConfirmed) {
                Swal.fire({ title: 'กำลังประมวลผล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "respondRequest", uid: userProfile.uid, matchId: matchId, response: responseStatus })
                })
                .then(res => res.json())
                .then(data => {
                    Swal.close();
                    fetchMatchStatus();
                });
            }
        });
    }
</script>
</body>
</html>
