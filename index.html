<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงทะเบียนสัมมนา</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <style>
        :root {
            --primary: #FFB6B9; /* พาสเทลชมพู */
            --secondary: #FAE3D9;
            --accent: #BBDED6; /* พาสเทลเขียว */
            --bg: #FDF6F0;
            --text: #4A4A4A;
        }
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo {
            width: 100%;
            max-height: 120px;
            /* รักษาอัตราส่วน ไม่ตัดทอนรูปภาพโลโก้ตามคำขอ */
            object-fit: contain; 
        }
        h2 { text-align: center; color: var(--primary); margin-top: 0; }
        label { font-weight: 500; font-size: 14px; margin-top: 10px; display: block; }
        input, select, textarea {
            width: 100%; padding: 10px; margin-top: 5px;
            border: 2px solid var(--secondary); border-radius: 10px;
            font-family: 'Sarabun', sans-serif; font-size: 14px;
            box-sizing: border-box;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); }
        .btn {
            width: 100%; padding: 12px; margin-top: 20px;
            background-color: var(--primary); color: white;
            border: none; border-radius: 10px; font-weight: 600; font-size: 16px;
            font-family: 'Sarabun', sans-serif; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background-color: #ff9a9e; }
        .btn-outline {
            background-color: transparent; color: var(--primary); border: 2px solid var(--primary);
        }
        .hidden { display: none; }
        .roommate-box {
            background: var(--secondary); padding: 10px; border-radius: 10px; margin-top: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <div class="logo-container">
            <img src="https://dwr.go.th/uploads/userfiles/images/Logodwr.png" alt="Logo" class="logo">
        </div>
        
        <div id="loadingSec">
            <h2 style="text-align:center;">กำลังโหลดระบบ...</h2>
        </div>

        <div id="verifySec" class="hidden">
            <h2>ค้นหาข้อมูลลงทะเบียน</h2>
            <label>ชื่อ (ไม่ต้องใส่คำนำหน้า)</label>
            <input type="text" id="v_fname" placeholder="ชื่อจริง">
            <label>หมายเลขบัตรประชาชน</label>
            <input type="text" id="v_idcard" placeholder="0-0000-00000-00-0" maxlength="17">
            <button class="btn" onclick="verifyUser()">ค้นหาข้อมูล</button>
        </div>

        <div id="registerSec" class="hidden">
            <h2>ข้อมูลการเดินทาง</h2>
            <p id="profileDisplay" style="font-size:14px; color:gray; text-align:center;"></p>
            
            <label>ประสงค์เข้าร่วมกิจกรรม</label>
            <select id="r_attend">
                <option value="Y">เข้าร่วม</option>
                <option value="N">ไม่เข้าร่วม</option>
            </select>

            <label>การเดินทาง (ขาไป)</label>
            <select id="r_travelOut">
                <option value="รถยนต์ส่วนบุคคล">รถยนต์ส่วนบุคคล</option>
                <option value="รถของกรม">ไปกับกรม</option>
            </select>

            <label>การเดินทาง (ขากลับ)</label>
            <select id="r_travelIn">
                <option value="รถยนต์ส่วนบุคคล">รถยนต์ส่วนบุคคล</option>
                <option value="รถของกรม">กลับกับกรม</option>
            </select>

            <label>การแพ้อาหาร (หากไม่มีให้ขีด -)</label>
            <input type="text" id="r_allergy" value="-">

            <label>ข้อมูลอาหาร (ไม่บังคับ)</label>
            <select id="r_food">
                <option value="-">ทั่วไป</option>
                <option value="อิสลาม">อิสลาม</option>
                <option value="มังสวิรัติ">มังสวิรัติ</option>
                <option value="อื่นๆ">อื่นๆ (โปรดระบุในหมายเหตุ)</option>
            </select>

            <label>เบอร์โทรศัพท์มือถือ</label>
            <input type="tel" id="r_phone">

            <label>ข้อมูลเพิ่มเติม</label>
            <textarea id="r_note" rows="2"></textarea>

            <button class="btn" onclick="submitData()">บันทึกข้อมูล</button>
        </div>

        <div id="roommateSec" class="hidden">
            <h2>จับคู่นอน</h2>
            <div id="pairRequestsList"></div>
            
            <label>ค้นหารายชื่อเพื่อจับคู่ (พิมพ์ชื่อ)</label>
            <input type="text" id="searchRoommate" onkeyup="filterCandidates()" placeholder="ค้นหาชื่อ...">
            <div id="candidatesList" style="margin-top: 15px;"></div>
            
            <p id="notFoundText" class="hidden" style="color:red; font-size:12px; text-align:center; margin-top:10px;">
                บุคคลที่ท่านกำลังค้นหาอาจยังไม่ลงทะเบียน ไม่เข้าร่วมกิจกรรมนี้ หรือจับคู่นอนไปเรียบร้อยแล้ว
            </p>
        </div>
    </div>

<script>
    // === การตั้งค่า API ===
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbz4SW3PjipqUdAMCj-IbqJhxTzUPyKq-Qa_5dkserHvu28bIFdFmHmeD5ReDtkjDaqc/exec'; // *** เปลี่ยนเป็น URL Web App ของคุณ ***
    const LIFF_ID = '2010492833-vdob7H57';     // *** เปลี่ยนเป็น LIFF ID ของคุณ ***

    let userUID = '';
    let userProfile = {};
    let allCandidates = [];

    // Mask ID Card 0-0000-00000-00-0
    document.getElementById('v_idcard').addEventListener('input', function (e) {
        let val = e.target.value.replace(/\D/g, '');
        let formatted = '';
        for(let i=0; i<val.length; i++){
            if(i==1 || i==5 || i==10 || i==12) formatted += '-';
            formatted += val[i];
        }
        e.target.value = formatted;
    });

    async function initializeLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            userUID = profile.userId;
            checkRegistration();
        } catch (err) {
            Swal.fire('Error', 'ไม่สามารถเชื่อมต่อ LINE ได้', 'error');
        }
    }

    async function fetchGAS(payload) {
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        return await response.json();
    }

    async function checkRegistration() {
        const res = await fetchGAS({ action: 'checkUID', uid: userUID });
        document.getElementById('loadingSec').classList.add('hidden');
        
        if (res.data.found) {
            // พบการลงทะเบียน เปิดให้แก้ไข หรือ ไปหน้าจับคู่
            userProfile.singleRoom = res.data.data[11]; 
            userProfile.fullName = res.data.data[3];
            
            Swal.fire({
                title: 'พบประวัติการลงทะเบียน',
                text: 'คุณต้องการแก้ไขข้อมูลหรือจัดการจับคู่นอน?',
                showCancelButton: true,
                confirmButtonText: 'แก้ไขข้อมูล',
                cancelButtonText: 'จัดการจับคู่นอน'
            }).then((result) => {
                if (result.isConfirmed) {
                    showSection('registerSec');
                    // Pre-fill data here if needed
                } else {
                    if(userProfile.singleRoom === 'Y') {
                        Swal.fire('แจ้งเตือน', 'คุณได้รับสิทธิ์นอนเดี่ยว ไม่ต้องทำการจับคู่', 'info');
                    } else {
                        loadRoommates();
                    }
                }
            });
        } else {
            // ยังไม่ลงทะเบียน
            Swal.fire('ยังไม่พบข้อมูล', 'กรุณายืนยันตัวตนก่อนลงทะเบียน', 'warning');
            showSection('verifySec');
        }
    }

    async function verifyUser() {
        const fname = document.getElementById('v_fname').value;
        const idcard = document.getElementById('v_idcard').value;
        if(fname === '' || idcard.length !== 17) return Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลให้ครบและถูกต้อง', 'warning');

        Swal.fire({ title: 'กำลังตรวจสอบ...', didOpen: () => { Swal.showLoading() } });
        const res = await fetchGAS({ action: 'verifyIdentity', idCard: idcard, firstName: fname });
        
        if (res.data.match) {
            userProfile = res.data.profile;
            userProfile.idCard = idcard;
            userProfile.fullName = `${userProfile.title}${userProfile.fname} ${userProfile.lname}`;
            
            Swal.fire('ตรวจสอบสำเร็จ', `ยินดีต้อนรับ ${userProfile.fullName}`, 'success');
            document.getElementById('profileDisplay').innerText = `${userProfile.fullName}\nตำแหน่ง: ${userProfile.pos}`;
            showSection('registerSec');
        } else {
            Swal.fire('ข้อผิดพลาด', 'ไม่พบข้อมูลในระบบ หรือกรอกข้อมูลไม่ตรง', 'error');
        }
    }

    async function submitData() {
        const payload = {
            action: 'register', uid: userUID,
            idCard: userProfile.idCard, fullName: userProfile.fullName, singleRoom: userProfile.singleRoom,
            attend: document.getElementById('r_attend').value,
            travelOut: document.getElementById('r_travelOut').value,
            travelIn: document.getElementById('r_travelIn').value,
            allergy: document.getElementById('r_allergy').value,
            foodPref: document.getElementById('r_food').value,
            phone: document.getElementById('r_phone').value,
            note: document.getElementById('r_note').value
        };

        Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => { Swal.showLoading() } });
        const res = await fetchGAS(payload);
        
        if (res.status === 'success') {
            if (payload.attend === 'N' || userProfile.singleRoom === 'Y') {
                Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อย', 'success').then(() => liff.closeWindow());
            } else {
                Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อย เข้าสู่ขั้นตอนจับคู่นอน', 'success');
                loadRoommates();
            }
        }
    }

    async function loadRoommates() {
        showSection('roommateSec');
        Swal.fire({ title: 'กำลังโหลดรายชื่อ...', didOpen: () => { Swal.showLoading() } });
        const res = await fetchGAS({ action: 'getRoommates', uid: userUID });
        Swal.close();

        // 1. จัดการคำขอที่ถูกส่งมาหาเรา
        const reqList = document.getElementById('pairRequestsList');
        reqList.innerHTML = '';
        if (res.data.requests.length > 0) {
            reqList.innerHTML = '<h3 style="color:var(--primary);">คำขอจับคู่ถึงคุณ:</h3>';
            res.data.requests.forEach(req => {
                reqList.innerHTML += `
                    <div class="roommate-box">
                        <span>${req.name}</span>
                        <button class="btn btn-outline" style="width:auto; margin:0; padding:5px 15px;" onclick="acceptPair('${req.uid}')">ตอบรับ</button>
                    </div>
                `;
            });
        }

        // 2. จัดการรายชื่อทั้งหมด
        allCandidates = res.data.candidates;
        renderCandidates(allCandidates);
    }

    function renderCandidates(list) {
        const listDiv = document.getElementById('candidatesList');
        const notFoundText = document.getElementById('notFoundText');
        listDiv.innerHTML = '';
        
        if (list.length === 0) {
            notFoundText.classList.remove('hidden');
        } else {
            notFoundText.classList.add('hidden');
            list.forEach(person => {
                listDiv.innerHTML += `
                    <div class="roommate-box">
                        <span style="font-size:14px;">${person.name}</span>
                        <button class="btn" style="width:auto; margin:0; padding:5px 10px;" onclick="requestPair('${person.uid}')">ขอจับคู่</button>
                    </div>
                `;
            });
        }
    }

    function filterCandidates() {
        const text = document.getElementById('searchRoommate').value.toLowerCase();
        const filtered = allCandidates.filter(c => c.name.toLowerCase().includes(text));
        renderCandidates(filtered);
    }

    async function requestPair(targetUid) {
        const res = await fetchGAS({ action: 'requestPair', fromUid: userUID, fromName: userProfile.fullName, toUid: targetUid });
        if(res.status === 'success') Swal.fire('สำเร็จ', 'ส่งคำขอจับคู่แล้ว รอการตอบรับ', 'success');
    }

    async function acceptPair(requesterUid) {
        const res = await fetchGAS({ action: 'acceptPair', myUid: userUID, requesterUid: requesterUid });
        if(res.status === 'success') Swal.fire('สำเร็จ', `คุณจับคู่กับ ${res.data.partner} เรียบร้อยแล้ว`, 'success').then(() => liff.closeWindow());
    }

    function showSection(id) {
        document.getElementById('loadingSec').classList.add('hidden');
        document.getElementById('verifySec').classList.add('hidden');
        document.getElementById('registerSec').classList.add('hidden');
        document.getElementById('roommateSec').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }

    // Start App
    // หากทดสอบบนคอมพิวเตอร์ที่ไม่มี LIFF ให้ปิดบรรทัด initializeLiff() ไว้ชั่วคราวแล้วจำลอง userUID เอาเอง
    window.onload = initializeLiff; 
</script>

</body>
</html>
