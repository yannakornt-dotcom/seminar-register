<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนสัมมนา - กรมทรัพยากรน้ำ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        water: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 900: '#0c4a6e' }
                    },
                    fontFamily: { sarabun: ['Sarabun', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); min-height: 100vh; }
        /* รักษาอัตราส่วนโลโก้ ห้ามตัดทอนเด็ดขาด */
        .brand-logo { max-width: 150px; height: auto; object-fit: contain; margin: 0 auto; display: block; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="w-full max-w-md p-6 glass-panel mt-6">
        <img src="https://dwr.go.th/uploads/userfiles/images/Logodwr.png" alt="โลโก้กรมทรัพยากรน้ำ" class="brand-logo mb-4">
        <h2 class="text-xl font-bold text-center text-water-900 mb-6 border-b-2 border-water-500 pb-2">ระบบลงทะเบียนสัมมนาต่างจังหวัด</h2>

        <div id="loading" class="text-center py-10">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-water-600 mx-auto mb-4"></div>
            <p class="text-water-600 font-medium">กำลังเตรียมระบบ...</p>
        </div>

        <div id="section-register" class="hidden">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700">ประสงค์เข้าร่วมกิจกรรม</label>
                <select id="reg_attending" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                    <option value="">-- กรุณาเลือก --</option>
                    <option value="Y">เข้าร่วม</option>
                    <option value="N">ไม่เข้าร่วม</option>
                </select>
            </div>
            <button onclick="submitRegistration()" class="w-full bg-water-600 hover:bg-water-500 text-white font-bold py-2 px-4 rounded-md shadow-md transition duration-200">บันทึกข้อมูล</button>
        </div>

        <div id="section-match" class="hidden mt-6 border-t pt-6">
            <h3 class="text-lg font-bold text-water-900 mb-4">จัดการห้องพัก (จับคู่นอน)</h3>
            <div id="match-status-box" class="bg-yellow-50 p-3 rounded text-sm text-yellow-800 mb-4 border border-yellow-200">
                สถานะ: <span id="current-room-status" class="font-bold">ตรวจสอบข้อมูล...</span>
            </div>

            <div class="flex gap-2 mb-4">
                <input type="text" id="search_partner" placeholder="พิมพ์ชื่อเพื่อค้นหา..." class="flex-1 rounded-md border p-2 text-sm">
                <button onclick="searchPartner()" class="bg-water-500 text-white px-4 rounded-md shadow">ค้นหา</button>
            </div>
            <div id="search-results" class="mb-4 text-sm"></div>

            <h4 class="font-bold text-gray-700 text-sm mt-4">คำขอที่รอการตอบรับ (จากผู้อื่น)</h4>
            <div id="incoming-requests" class="bg-white p-2 rounded border min-h-[50px] mb-4 text-sm text-gray-500">
                ไม่มีคำขอ
            </div>
        </div>
    </div>

    <script>
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbz4SW3PjipqUdAMCj-IbqJhxTzUPyKq-Qa_5dkserHvu28bIFdFmHmeD5ReDtkjDaqc/exec';
        let currentUser = { uid: '', profile: null, singleRoom: 'N' };
        let pollingInterval = null;

        // 1. LIFF Init
        async function initializeLiff() {
            try {
                // await liff.init({ liffId: "2010492833-vdob7H57" });
                // if (!liff.isLoggedIn()) { liff.login(); return; }
                // const profile = await liff.getProfile();
                // Mockup for testing
                const profile = { userId: 'U1234567890abcdef', displayName: 'Tester' }; 
                currentUser.uid = profile.userId;
                
                checkUserRegistration();
            } catch (err) {
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อระบบ LINE ได้', 'error');
            }
        }

        // 2. Core API Caller
        async function callGAS(payload) {
            const response = await fetch(GAS_API_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            return await response.json();
        }

        // 3. Flow: เช็คข้อมูลลงทะเบียน
        async function checkUserRegistration() {
            const res = await callGAS({ action: 'checkUser', uid: currentUser.uid });
            document.getElementById('loading').classList.add('hidden');
            
            if (res.data.isRegistered) {
                // พบข้อมูล -> แสดงหน้าฟอร์มให้แก้ไข และเปิดส่วนจับคู่
                document.getElementById('section-register').classList.remove('hidden');
                document.getElementById('section-match').classList.remove('hidden');
                startPolling();
            } else {
                // ไม่พบ -> เด้ง Pop-up ให้กรอกบัตรประชาชน
                promptIDCard();
            }
        }

        async function promptIDCard() {
            const { value: idCard } = await Swal.fire({
                title: 'ยืนยันตัวตน',
                text: 'กรุณากรอกหมายเลขบัตรประชาชน 13 หลัก',
                input: 'text',
                inputPlaceholder: '0-0000-00000-00-0',
                allowOutsideClick: false
            });

            if (idCard) {
                const res = await callGAS({ action: 'verifyIDCard', uid: currentUser.uid, idCard: idCard });
                if (res.data.found) {
                    Swal.fire('สำเร็จ', `ยินดีต้อนรับ ${res.data.firstname} ${res.data.lastname}`, 'success');
                    currentUser.singleRoom = res.data.singleRoom;
                    document.getElementById('section-register').classList.remove('hidden');
                } else {
                    Swal.fire('ไม่พบข้อมูล', 'กรุณาติดต่อเจ้าหน้าที่', 'error');
                }
            }
        }

        // 4. Polling ระบบจับคู่
        function startPolling() {
            pollData(); // Run immediately
            pollingInterval = setInterval(pollData, 5000); // Poll every 5 seconds
        }

        async function pollData() {
            const res = await callGAS({ action: 'pollMatchStatus', uid: currentUser.uid });
            const data = res.data;
            
            // อัปเดต UI สถานะ
            document.getElementById('current-room-status').innerText = data.roomStatus === 'Matched' ? 'จับคู่สำเร็จแล้ว' : 'รอดำเนินการ';

            // เรนเดอร์คำขอที่ได้รับ
            const incomingBox = document.getElementById('incoming-requests');
            if (data.incoming.length > 0) {
                incomingBox.innerHTML = data.incoming.map(req => `
                    <div class="flex justify-between items-center bg-water-50 p-2 mb-2 rounded border">
                        <span>มีคำขอจาก <span class="font-bold text-water-600">UID: ${req.fromUid.substring(0,5)}...</span></span>
                        <div>
                            <button onclick="respondMatch('${req.reqId}', 'accept')" class="bg-green-500 text-white px-2 py-1 rounded text-xs">รับ</button>
                            <button onclick="respondMatch('${req.reqId}', 'reject')" class="bg-red-500 text-white px-2 py-1 rounded text-xs">ปฏิเสธ</button>
                        </div>
                    </div>
                `).join('');
            } else {
                incomingBox.innerHTML = 'ไม่มีคำขอ';
            }
        }

        async function searchPartner() {
            const keyword = document.getElementById('search_partner').value;
            const res = await callGAS({ action: 'searchPartner', uid: currentUser.uid, keyword: keyword });
            
            const resultBox = document.getElementById('search-results');
            if (res.data.length === 0) {
                resultBox.innerHTML = '<span class="text-red-500">บุคคลที่ท่านกำลังค้นหาอาจยังไม่ลงทะเบียน ไม่เข้าร่วมกิจกรรมนี้ หรือจับคู่นอนไปเรียบร้อยแล้ว</span>';
            } else {
                resultBox.innerHTML = res.data.map(p => `
                    <div class="flex justify-between items-center border-b py-2">
                        <span>${p.name} (${p.department})</span>
                        <button onclick="sendRequest('${p.uid}')" class="bg-water-600 text-white text-xs px-3 py-1 rounded">ส่งคำขอ</button>
                    </div>
                `).join('');
            }
        }

        async function sendRequest(targetUid) {
            Swal.fire({ title: 'กำลังส่งคำขอ...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
            await callGAS({ action: 'sendMatchRequest', uid: currentUser.uid, targetUid: targetUid });
            Swal.fire('สำเร็จ', 'ส่งคำขอเรียบร้อยแล้ว', 'success');
            pollData();
        }

        async function respondMatch(reqId, response) {
            Swal.fire({ title: 'กำลังประมวลผล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
            await callGAS({ action: 'respondMatch', reqId: reqId, uid: currentUser.uid, response: response });
            Swal.fire('สำเร็จ', response === 'accept' ? 'จับคู่สำเร็จ!' : 'ปฏิเสธคำขอแล้ว', 'success');
            pollData();
        }

        // Initialize when page loads
        window.onload = initializeLiff;
    </script>
</body>
</html>
